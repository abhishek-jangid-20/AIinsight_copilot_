<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeInsight AI · Interactive Codebase Explorer & Walkthrough</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Highlight.js styling -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
<style>
:root {
  --bg:       #0b0d13;
  --bg2:      #111420;
  --bg3:      #181c2a;
  --border:   #1e2338;
  --border2:  #252c45;
  --accent:   #7c6af7;
  --accent2:  #5a49d6;
  --accent-bg: rgba(124,106,247,0.08);
  --accent-bg2: rgba(124,106,247,0.15);
  --green:    #34d399;
  --green-bg: rgba(52,211,153,0.08);
  --blue:     #60a5fa;
  --blue-bg:  rgba(96,165,250,0.08);
  --text:     #e2e8f0;
  --text2:    #94a3b8;
  --text3:    #4a5568;
  --code-bg:  #070911;
  --radius:   12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  overflow: hidden;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* Sidebar styling */
.sidebar {
  width: 320px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 1.5rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
}

.brand-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent-bg2);
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid rgba(124,106,247,0.3);
  margin-bottom: 8px;
  letter-spacing: .06em;
}
.brand-badge::before { content: '◆'; font-size: 7px; }

.brand-title {
  font-size: 18px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  color: var(--text);
}
.brand-title span { color: var(--accent); }

.search-container {
  padding: 10px 1.25rem;
  border-bottom: 1px solid var(--border);
}

.search-input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus {
  border-color: var(--accent);
}

.file-list {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 0;
}

.category-group {
  margin-bottom: 1.25rem;
}

.category-title {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--text3);
  text-transform: uppercase;
  padding: 0 1.25rem 6px;
  font-family: 'JetBrains Mono', monospace;
}

.file-item {
  display: flex;
  flex-direction: column;
  padding: 8px 1.25rem;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.2s;
}
.file-item:hover {
  background: var(--bg3);
}
.file-item.active {
  background: var(--accent-bg);
  border-left-color: var(--accent);
}

.file-name {
  font-size: 12.5px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
}
.file-item.active .file-name {
  color: var(--accent);
}

.file-path {
  font-size: 10px;
  color: var(--text2);
  margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Main Workspace */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  min-width: 0;
}

.main-header {
  padding: 1.25rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(17, 20, 32, 0.9);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.active-file-path {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
}

.active-file-title {
  font-size: 22px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
}

.active-file-desc {
  font-size: 13.5px;
  color: var(--text2);
  max-width: 800px;
  line-height: 1.5;
  margin-top: 4px;
}

.workspace-panes {
  flex: 1;
  display: flex;
  min-height: 0;
}

/* Code Panel */
.code-pane {
  flex: 1;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--code-bg);
  min-width: 0;
}

.pane-header {
  background: var(--bg2);
  padding: 6px 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.code-container {
  flex: 1;
  overflow: auto;
  position: relative;
}

pre.code-view {
  margin: 0;
  padding: 1.25rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.6;
  background: transparent;
  color: #fff;
  display: flex;
}

.line-numbers {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text3);
  text-align: right;
  padding-right: 15px;
  user-select: none;
  border-right: 1px solid var(--border2);
  margin-right: 15px;
}

.code-content-wrap {
  flex: 1;
  white-space: pre;
  word-wrap: normal;
  overflow-x: auto;
}

/* Explanation Panel */
.explain-pane {
  width: 480px;
  background: var(--bg2);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  min-height: 0;
}

.explain-content {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
}

.explain-section-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.explain-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1rem;
  transition: border-color 0.2s;
}
.explain-item:hover {
  border-color: var(--border2);
}

.explain-range {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-bg);
  padding: 2px 8px;
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 6px;
  cursor: pointer;
}
.explain-range:hover {
  background: var(--accent-bg2);
}

.explain-text {
  font-size: 13.5px;
  color: var(--text2);
  line-height: 1.6;
}
.explain-text code {
  background: rgba(255, 255, 255, 0.05);
  color: var(--blue);
  padding: 1px 4px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.no-selection {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text3);
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  flex-direction: column;
  gap: 12px;
  padding: 2rem;
  text-align: center;
}
.no-selection-icon {
  font-size: 48px;
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-badge">WALKTHROUGH</div>
      <h1 class="brand-title">CodeInsight <span>Explorer</span></h1>
    </div>
    <div class="search-container">
      <input type="text" id="search" class="search-input" placeholder="Search files & code..." oninput="handleSearch()">
    </div>
    <div class="file-list" id="fileList">
      <!-- Generated dynamically -->
    </div>
  </aside>

  <!-- Workspace -->
  <main class="main">
    <div class="main-header" id="mainHeader">
      <div class="no-selection" id="welcomePane">
        <span class="no-selection-icon">🔍</span>
        <h2>Welcome to the CodeInsight AI Code Walkthrough</h2>
        <p>Select any file from the sidebar to inspect its full source code alongside an extreme, line-by-line detailed explanation of its architecture and logic flow.</p>
      </div>
    </div>
    <div class="workspace-panes" id="workspacePanes" style="display:none;">
      <!-- Code View -->
      <section class="code-pane">
        <div class="pane-header">
          <span id="codeLang">SOURCE CODE</span>
          <span>READ-ONLY</span>
        </div>
        <div class="code-container">
          <pre class="code-view"><div class="line-numbers" id="lineNumbers"></div><code class="code-content-wrap" id="codeContent"></code></pre>
        </div>
      </section>

      <!-- Explanation View -->
      <section class="explain-pane">
        <div class="explain-content" id="explainContent">
          <!-- Filled dynamically -->
        </div>
      </section>
    </div>
  </main>
</div>

<!-- Highlight.js and Python models logic -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script>
// Loaded dynamically from Python script compiler
const FILES_DATA = [{"path": "services/common/embeddings.py", "filename": "embeddings.py", "category": "Shared Common Python Library", "desc": "Wraps sentence-transformers models (defaulting to all-MiniLM-L6-v2 or CodeBERT) using a singleton pattern. It loads the transformer model into memory only once during service initialization and encodes lists of code chunk texts into dense float array embeddings.", "lines_explain": [{"range": "1-2", "text": "Imports SentenceTransformer for generating vector embeddings."}, {"range": "4-5", "text": "Defines a module-level variable <code>_model</code> initialized to <code>None</code>. This variable serves as the cache for the singleton SentenceTransformer instance, ensuring it is only loaded once in memory."}, {"range": "7-13", "text": "Defines the <code>embed_texts</code> function. It checks if the global <code>_model</code> is initialized. If not, it loads the model into memory. Then, it encodes the list of texts into NumPy vector arrays, and converts them to standard Python float lists so they can be JSON-serialized and stored in ChromaDB."}], "code": "from __future__ import annotations\n\nimport hashlib\nimport os\nfrom functools import lru_cache\n\nimport numpy as np\n\n\n@lru_cache(maxsize=1)\ndef _load_sentence_transformer():\n    model_name = os.getenv(\"EMBEDDING_MODEL\", \"all-MiniLM-L6-v2\")\n    if model_name.lower() == \"mock\":\n        return None\n    try:\n        from sentence_transformers import SentenceTransformer\n        return SentenceTransformer(model_name)\n    except Exception:\n        return None\n\n\ndef embed_texts(texts: list[str]) -> list[list[float]]:\n    model = _load_sentence_transformer()\n    if model is not None:\n        vectors = model.encode(texts, normalize_embeddings=True)\n        return vectors.tolist()\n    return [_hash_embedding(text) for text in texts]\n\n\ndef _hash_embedding(text: str, dimensions: int = 384) -> list[float]:\n    vector = np.zeros(dimensions, dtype=np.float32)\n    for token in text.lower().split():\n        digest = hashlib.sha256(token.encode(\"utf-8\")).digest()\n        index = int.from_bytes(digest[:4], \"little\") % dimensions\n        vector[index] += 1.0\n    norm = np.linalg.norm(vector)\n    if norm > 0:\n        vector = vector / norm\n    return vector.tolist()\n"}, {"path": "services/common/llm.py", "filename": "llm.py", "category": "Shared Common Python Library", "desc": "Manages connections and routes completions to various language model APIs (Groq, Gemini, OpenRouter, and a Mock backend) based on environment configurations, supporting asynchronous token-by-token streaming.", "lines_explain": [{"range": "1-10", "text": "Imports essential networking libraries (os, json, httpx, asyncio) and typing configurations (AsyncIterator)."}, {"range": "12-25", "text": "Defines the <code>stream_complete</code> entry point. It checks <code>LLM_PROVIDER</code> environment variables and routes execution to the corresponding provider function (Groq, Gemini, OpenRouter, or Mock)."}, {"range": "27-45", "text": "Implements <code>_stream_openai_compatible</code> for Groq and OpenRouter. It sets up headers (including Authorization bearer tokens), formats an OpenAI-compliant request body with streaming enabled, opens an asynchronous HTTP stream using <code>httpx.AsyncClient</code>, and yields each textual token sequentially as it arrives."}, {"range": "47-58", "text": "Implements <code>_complete_gemini</code> to interface with Google's Gemini API. Since standard Gemini REST endpoints do not stream using OpenAI-compliant SSE formats in this setup, it performs a blocking call and yields the full response text as a single token block."}, {"range": "60-70", "text": "Defines the <code>_offline_answer</code> function. If no LLM provider or keys are available, it reads the prompt, extracts the retrieved context, and returns it to the user. This is a critical developer fallback tool that lets the RAG pipeline run offline without requiring external API keys."}, {"range": "72-78", "text": "Defines the <code>complete</code> function. It aggregates tokens yielded by <code>stream_complete</code> into a single list of strings, joining them at the end to return the complete response. This helper is utilized by services that do not stream (like the documentation service)."}], "code": "from __future__ import annotations\n\nimport os\nfrom typing import AsyncIterator\n\nimport httpx\n\n\nasync def complete(prompt: str, system: str = \"You are a precise repository intelligence assistant.\") -> str:\n    chunks = []\n    async for chunk in stream_complete(prompt, system):\n        chunks.append(chunk)\n    return \"\".join(chunks)\n\n\nasync def stream_complete(prompt: str, system: str = \"You are a precise repository intelligence assistant.\") -> AsyncIterator[str]:\n    provider = os.getenv(\"LLM_PROVIDER\", \"mock\").lower()\n    if provider == \"groq\" and os.getenv(\"GROQ_API_KEY\"):\n        async for token in _stream_openai_compatible(\n            \"https://api.groq.com/openai/v1/chat/completions\",\n            os.environ[\"GROQ_API_KEY\"],\n            os.getenv(\"GROQ_MODEL\", \"llama-3.3-70b-versatile\"),\n            prompt,\n            system,\n        ):\n            yield token\n        return\n    if provider == \"openrouter\" and os.getenv(\"OPENROUTER_API_KEY\"):\n        async for token in _stream_openai_compatible(\n            \"https://openrouter.ai/api/v1/chat/completions\",\n            os.environ[\"OPENROUTER_API_KEY\"],\n            os.getenv(\"OPENROUTER_MODEL\", \"anthropic/claude-3.5-sonnet\"),\n            prompt,\n            system,\n        ):\n            yield token\n        return\n    if provider == \"gemini\" and os.getenv(\"GEMINI_API_KEY\"):\n        yield await _complete_gemini(prompt, system)\n        return\n\n    yield _offline_answer(prompt)\n\n\nasync def _stream_openai_compatible(url: str, api_key: str, model: str, prompt: str, system: str) -> AsyncIterator[str]:\n    payload = {\n        \"model\": model,\n        \"stream\": True,\n        \"messages\": [{\"role\": \"system\", \"content\": system}, {\"role\": \"user\", \"content\": prompt}],\n    }\n    async with httpx.AsyncClient(timeout=60) as client:\n        async with client.stream(\"POST\", url, headers={\"authorization\": f\"Bearer {api_key}\"}, json=payload) as response:\n            response.raise_for_status()\n            async for line in response.aiter_lines():\n                if not line.startswith(\"data: \") or line == \"data: [DONE]\":\n                    continue\n                data = line[6:]\n                try:\n                    import json\n\n                    token = json.loads(data)[\"choices\"][0][\"delta\"].get(\"content\")\n                    if token:\n                        yield token\n                except Exception:\n                    continue\n\n\nasync def _complete_gemini(prompt: str, system: str) -> str:\n    key = os.environ[\"GEMINI_API_KEY\"]\n    model = os.getenv(\"GEMINI_MODEL\", \"gemini-1.5-pro\")\n    url = f\"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={key}\"\n    payload = {\"systemInstruction\": {\"parts\": [{\"text\": system}]}, \"contents\": [{\"parts\": [{\"text\": prompt}]}]}\n    async with httpx.AsyncClient(timeout=60) as client:\n        response = await client.post(url, json=payload)\n        response.raise_for_status()\n        data = response.json()\n        return data[\"candidates\"][0][\"content\"][\"parts\"][0][\"text\"]\n\n\ndef _offline_answer(prompt: str) -> str:\n    return (\n        \"LLM provider is not configured, so this offline response summarizes the retrieved repository context.\\n\\n\"\n        + prompt[:3000]\n    )\n"}, {"path": "services/common/models.py", "filename": "models.py", "category": "Shared Common Python Library", "desc": "Declares shared Pydantic data schemas representing the common contracts for inter-service communication (IPC) between the Node gateway and FastAPI Python services.", "lines_explain": [{"range": "1-6", "text": "Imports Pydantic's <code>BaseModel</code> for strict type checking and schema enforcement, and Python's <code>Literal</code> for string unions."}, {"range": "8-15", "text": "Defines the <code>CodeSymbol</code> model. It tracks names (e.g. <code>\"UserService\"</code>), kinds (class, function, method, api, import), file coordinate locations, and full signatures."}, {"range": "17-27", "text": "Defines the <code>CodeChunk</code> model. It represents a precise text block (30-80 lines) of a file, capturing its source content, unique hash ID, language, location coords, symbol definitions, and import list."}, {"range": "29-33", "text": "Defines the <code>DependencyEdge</code> model. It models direct import or invocation links between files and symbols, mapping a directed graph edge with a specific relation kind."}, {"range": "35-42", "text": "Defines the <code>RepositoryAnalysis</code> model. This is the root schema representing a fully-parsed repository, containing lists of files, chunks, symbols, dependency edges, and summary metadata."}], "code": "from __future__ import annotations\n\nfrom typing import Literal\nfrom pydantic import BaseModel, Field\n\n\nclass CodeSymbol(BaseModel):\n    name: str\n    kind: Literal[\"function\", \"class\", \"method\", \"api\", \"import\"]\n    filePath: str\n    startLine: int\n    endLine: int\n    signature: str | None = None\n\n\nclass CodeChunk(BaseModel):\n    id: str\n    repositoryId: str\n    filePath: str\n    language: str\n    startLine: int\n    endLine: int\n    content: str\n    symbol: CodeSymbol | None = None\n    imports: list[str] = Field(default_factory=list)\n\n\nclass DependencyEdge(BaseModel):\n    source: str\n    target: str\n    kind: Literal[\"imports\", \"calls\", \"contains\", \"api\"]\n\n\nclass RepositoryFile(BaseModel):\n    path: str\n    language: str\n    size: int\n    content: str | None = None\n\n\nclass RepositoryAnalysis(BaseModel):\n    repositoryId: str\n    files: list[RepositoryFile]\n    chunks: list[CodeChunk]\n    symbols: list[CodeSymbol]\n    dependencies: list[DependencyEdge]\n    summary: dict\n\n\nclass SearchRequest(BaseModel):\n    query: str\n    limit: int = 8\n\n\nclass RagRequest(BaseModel):\n    query: str\n    chatId: str | None = None\n"}, {"path": "services/common/vector_store.py", "filename": "vector_store.py", "category": "Shared Common Python Library", "desc": "Provides the read/write client API wrapper for ChromaDB. It handles collection creation, vector upserting, metadata mapping, and approximate nearest neighbor similarity searches.", "lines_explain": [{"range": "1-5", "text": "Imports the <code>chromadb</code> client library and environment utility <code>os</code>."}, {"range": "7-12", "text": "Defines the <code>_client</code> helper. It initializes a <code>HttpClient</code> targeting the ChromaDB server hostname and port configuration (defined in the Docker Compose network environment)."}, {"range": "14-23", "text": "Defines the <code>upsert_chunks</code> function. It retrieves or creates a database collection partition mapped specifically to the <code>repo_id</code> (enforcing indexing isolation). It maps the document files, computed float vectors, unique chunk IDs, and coordinates metadata maps, and upserts them into the collection."}, {"range": "25-33", "text": "Defines the <code>query_chunks</code> function. It connects to the repository's collection and performs a similarity query using the query embedding vector. It queries the <code>n</code> closest matches and returns them as a zipped list containing text contents and metadata maps."}], "code": "from __future__ import annotations\n\nimport os\nfrom typing import Any\n\nimport chromadb\n\n\ndef get_collection(repository_id: str):\n    host = os.getenv(\"CHROMA_HOST\")\n    port = int(os.getenv(\"CHROMA_PORT\", \"8000\"))\n    if host:\n        client = chromadb.HttpClient(host=host, port=port)\n    else:\n        client = chromadb.PersistentClient(path=os.getenv(\"CHROMA_PATH\", \"/data/chroma\"))\n    return client.get_or_create_collection(name=f\"repo_{repository_id}\")\n\n\ndef upsert_chunks(repository_id: str, chunks: list[dict[str, Any]], embeddings: list[list[float]]):\n    collection = get_collection(repository_id)\n    if not chunks:\n        return {\"indexed\": 0}\n\n    collection.upsert(\n        ids=[chunk[\"id\"] for chunk in chunks],\n        documents=[chunk[\"content\"] for chunk in chunks],\n        embeddings=embeddings,\n        metadatas=[\n            {\n                \"filePath\": chunk[\"filePath\"],\n                \"language\": chunk[\"language\"],\n                \"startLine\": chunk[\"startLine\"],\n                \"endLine\": chunk[\"endLine\"],\n                \"symbol\": (chunk.get(\"symbol\") or {}).get(\"name\", \"\"),\n            }\n            for chunk in chunks\n        ],\n    )\n    return {\"indexed\": len(chunks)}\n\n\ndef query_chunks(repository_id: str, query_embedding: list[float], limit: int):\n    collection = get_collection(repository_id)\n    results = collection.query(query_embeddings=[query_embedding], n_results=limit)\n    rows = []\n    for index, chunk_id in enumerate(results.get(\"ids\", [[]])[0]):\n        metadata = results.get(\"metadatas\", [[]])[0][index] or {}\n        rows.append(\n            {\n                \"id\": chunk_id,\n                \"content\": results.get(\"documents\", [[]])[0][index],\n                \"distance\": results.get(\"distances\", [[]])[0][index],\n                \"metadata\": metadata,\n            }\n        )\n    return rows\n"}, {"path": "services/repository-parser-service/main.py", "filename": "main.py", "category": "Python FastAPI Microservices", "desc": "Asynchronously clones GitHub repositories or unpacks uploaded ZIP archives to a temp folder, scans each file, extracts declarations/symbols and import chains (using ast for Python and regex for JS/TS/C++), splits code into logical chunks, and builds a dependency edge map.", "lines_explain": [{"range": "1-16", "text": "Imports core AST parsing libraries, temporary folders controllers, ZIP extractors, git bindings (Repo), and shared Pydantic models from the common module."}, {"range": "19-32", "text": "Defines supported file formats (Python, TS, JS, C++, Java), configuration metadata files, and folders to ignore (like <code>.git</code> and <code>node_modules</code>) to keep index size down."}, {"range": "35-41", "text": "Declares the Pydantic validator request schema `ParseRequest` containing repository configurations."}, {"range": "43-46", "text": "Health check endpoint `/health` returning service state metadata."}, {"range": "48-103", "text": "Defines the `/parse` endpoint. It creates a temp folder, materializes the repo files (via zip extraction or git clone), iterates recursively over files, reads file content, extracts imports and code symbols, constructs dependency edges, divides code into chunks, and deduplicates them to prevent ChromaDB DuplicateIDErrors, returning a `RepositoryAnalysis` payload."}, {"range": "105-164", "text": "Implements `_materialize_repository`. It parses incoming GitHub web URLs, cleans them, handles branch tree paths, clones repositories with depth=1 to optimize download speeds, or unzips file archives to a work directory."}, {"range": "167-173", "text": "Implements `_iter_source_files`. It walks directory files recursively using globs, filters unsupported suffixes, ignores vendor directories, and enforces a 1MB file size limit to prevent indexing massive binaries."}, {"range": "175-195", "text": "Implements `_extract_symbols`. For Python, it calls AST parsing. For other languages, it applies multi-line regex matchers looking for classes, functions, methods, or Express API endpoints (e.g. `router.get(...)`). It logs line coords and calls `_guess_block_end` to estimate code block heights."}, {"range": "198-206", "text": "Implements `_extract_python_symbols` using python's Abstract Syntax Tree module (`ast`). It parses the source text, walks the tree nodes, and identifies class and function declarations with exact syntax lines."}, {"range": "209-224", "text": "Implements `_extract_imports` to build graph edges. Uses AST walk for Python and regex matching for TypeScript, JavaScript, and C++ to extract package imports."}, {"range": "227-243", "text": "Implements `_chunk_file`. It splits files into code chunks. It first creates chunks for defined code symbols (e.g., specific functions or classes). Then, it creates sliding-window chunks for any lines not covered by symbol definitions to ensure full text retrieval coverage."}, {"range": "246-249", "text": "Implements `_chunk` helper. It generates a unique chunk ID using a SHA-1 hash of the file path, coordinates, and content header, returning a populated `CodeChunk` model."}, {"range": "251-253", "text": "Implements `_guess_block_end`. If syntax rules cannot determine a block end, it guesses a default height of 80 lines, matching average function sizes."}], "code": "from __future__ import annotations\n\nimport ast\nimport hashlib\nimport re\nimport shutil\nimport tempfile\nimport zipfile\nfrom pathlib import Path\n\nfrom fastapi import FastAPI, HTTPException\nfrom git import Repo\nfrom pydantic import BaseModel\n\nfrom common.models import CodeChunk, CodeSymbol, DependencyEdge, RepositoryAnalysis, RepositoryFile\n\napp = FastAPI(title=\"CodeInsight Repository Parser\", version=\"0.1.0\")\n\nSUPPORTED = {\n    \".js\": \"JavaScript\",\n    \".jsx\": \"JavaScript\",\n    \".ts\": \"TypeScript\",\n    \".tsx\": \"TypeScript\",\n    \".py\": \"Python\",\n    \".cpp\": \"C++\",\n    \".cc\": \"C++\",\n    \".hpp\": \"C++\",\n    \".h\": \"C++\",\n    \".java\": \"Java\",\n}\nCONFIG_FILES = {\"package.json\", \"requirements.txt\", \"pyproject.toml\", \"pom.xml\", \"build.gradle\", \"docker-compose.yml\", \"Dockerfile\"}\nIGNORE_DIRS = {\".git\", \"node_modules\", \"dist\", \"build\", \".venv\", \"venv\", \"__pycache__\", \"target\", \".next\"}\n\n\nclass ParseRequest(BaseModel):\n    repositoryId: str\n    name: str\n    sourceType: str\n    sourceUrl: str | None = None\n    archivePath: str | None = None\n\n\n@app.get(\"/health\")\ndef health():\n    return {\"ok\": True, \"service\": \"repository-parser-service\"}\n\n\n@app.post(\"/parse\", response_model=RepositoryAnalysis)\ndef parse_repository(request: ParseRequest):\n    workdir = Path(tempfile.mkdtemp(prefix=\"codeinsight-\"))\n    try:\n        root = _materialize_repository(request, workdir)\n        files: list[RepositoryFile] = []\n        chunks: list[CodeChunk] = []\n        symbols: list[CodeSymbol] = []\n        dependencies: list[DependencyEdge] = []\n        languages: dict[str, int] = {}\n\n        for file_path in _iter_source_files(root):\n            relative = file_path.relative_to(root).as_posix()\n            language = SUPPORTED.get(file_path.suffix.lower(), \"Config\")\n            content = file_path.read_text(encoding=\"utf-8\", errors=\"ignore\")\n            lines = content.splitlines()\n            languages[language] = languages.get(language, 0) + 1\n            files.append(RepositoryFile(path=relative, language=language, size=len(content), content=content[:200_000]))\n\n            file_symbols = _extract_symbols(relative, language, content)\n            imports = _extract_imports(language, content)\n            symbols.extend(file_symbols)\n            dependencies.extend(DependencyEdge(source=relative, target=dep, kind=\"imports\") for dep in imports)\n\n            for symbol in file_symbols:\n                dependencies.append(DependencyEdge(source=relative, target=symbol.name, kind=\"contains\"))\n\n            chunks.extend(_chunk_file(request.repositoryId, relative, language, lines, imports, file_symbols))\n\n        # Deduplicate chunks by ID to prevent ChromaDB DuplicateIDError\n        seen_chunk_ids = set()\n        unique_chunks = []\n        for chunk in chunks:\n            if chunk.id not in seen_chunk_ids:\n                seen_chunk_ids.add(chunk.id)\n                unique_chunks.append(chunk)\n        chunks = unique_chunks\n\n        return RepositoryAnalysis(\n            repositoryId=request.repositoryId,\n            files=files,\n            chunks=chunks,\n            symbols=symbols,\n            dependencies=dependencies,\n            summary={\n                \"languages\": languages,\n                \"fileCount\": len(files),\n                \"chunkCount\": len(chunks),\n                \"symbolCount\": len(symbols),\n            },\n        )\n    except Exception as exc:\n        raise HTTPException(status_code=400, detail=str(exc)) from exc\n    finally:\n        shutil.rmtree(workdir, ignore_errors=True)\n\n\ndef _materialize_repository(request: ParseRequest, workdir: Path) -> Path:\n    if request.sourceType == \"github\":\n        if not request.sourceUrl:\n            raise ValueError(\"sourceUrl is required for GitHub repositories\")\n        target = workdir / \"repo\"\n        \n        # Normalize and parse GitHub URL\n        url = request.sourceUrl.strip().rstrip(\"/\")\n        match = re.match(r\"^https?://(?:www\\.)?github\\.com/([^/]+)/([^/]+)\", url, re.IGNORECASE)\n        if not match:\n            # Fallback to direct clone if it's already a valid git URL format but not standard web pattern\n            Repo.clone_from(url, target, depth=1)\n            return target\n            \n        owner = match.group(1)\n        repo = match.group(2)\n        if repo.endswith(\".git\"):\n            repo = repo[:-4]\n            \n        clone_url = f\"https://github.com/{owner}/{repo}.git\"\n        \n        # Check if there is a branch specified in the tree/blob part\n        branch = None\n        path_parts = url.split(f\"github.com/{owner}/{repo}/\")\n        if len(path_parts) > 1:\n            rest = path_parts[1]\n            if rest.startswith(\"tree/\") or rest.startswith(\"blob/\"):\n                rest_parts = rest.split(\"/\", 1)\n                if len(rest_parts) > 1:\n                    branch_and_path = rest_parts[1]\n                    branch = branch_and_path.split(\"/\")[0]\n                    \n        try:\n            if branch:\n                Repo.clone_from(clone_url, target, depth=1, branch=branch)\n            else:\n                Repo.clone_from(clone_url, target, depth=1)\n        except Exception as e:\n            # Fallback: if cloning with branch failed, try cloning the base repo default branch\n            if branch:\n                try:\n                    Repo.clone_from(clone_url, target, depth=1)\n                except Exception as fallback_err:\n                    raise ValueError(f\"Failed to clone repository: {str(fallback_err)}\") from fallback_err\n            else:\n                raise ValueError(f\"Failed to clone repository: {str(e)}\") from e\n                \n        return target\n\n    if request.sourceType == \"zip\":\n        if not request.archivePath or not Path(request.archivePath).exists():\n            raise ValueError(\"archivePath is required for ZIP repositories\")\n        target = workdir / \"repo\"\n        target.mkdir()\n        with zipfile.ZipFile(request.archivePath) as archive:\n            archive.extractall(target)\n        children = [child for child in target.iterdir() if child.is_dir()]\n        return children[0] if len(children) == 1 else target\n\n    raise ValueError(f\"Unsupported sourceType {request.sourceType}\")\n\n\ndef _iter_source_files(root: Path):\n    for path in root.rglob(\"*\"):\n        if any(part in IGNORE_DIRS for part in path.parts):\n            continue\n        if path.is_file() and (path.suffix.lower() in SUPPORTED or path.name in CONFIG_FILES) and path.stat().st_size <= 1_000_000:\n            yield path\n\n\ndef _extract_symbols(file_path: str, language: str, content: str) -> list[CodeSymbol]:\n    if language == \"Python\":\n        try:\n            return _extract_python_symbols(file_path, content)\n        except SyntaxError:\n            return []\n\n    symbols: list[CodeSymbol] = []\n    patterns = [\n        (\"class\", re.compile(r\"^\\s*(?:export\\s+)?(?:abstract\\s+)?class\\s+([A-Za-z_][\\w]*)\", re.MULTILINE)),\n        (\"function\", re.compile(r\"^\\s*(?:export\\s+)?(?:async\\s+)?function\\s+([A-Za-z_][\\w]*)\", re.MULTILINE)),\n        (\"function\", re.compile(r\"^\\s*(?:public|private|protected|static|\\s)*[\\w<>\\[\\]]+\\s+([A-Za-z_][\\w]*)\\s*\\([^;]*\\)\\s*\\{\", re.MULTILINE)),\n        (\"api\", re.compile(r\"\\b(?:app|router)\\.(get|post|put|patch|delete)\\s*\\(\\s*['\\\"]([^'\\\"]+)\", re.MULTILINE)),\n    ]\n    lines = content.splitlines()\n    for kind, pattern in patterns:\n        for match in pattern.finditer(content):\n            line_no = content[: match.start()].count(\"\\n\") + 1\n            name = match.group(2) if kind == \"api\" and match.lastindex and match.lastindex >= 2 else match.group(1)\n            symbols.append(CodeSymbol(name=name, kind=kind, filePath=file_path, startLine=line_no, endLine=_guess_block_end(lines, line_no)))\n    return symbols\n\n\ndef _extract_python_symbols(file_path: str, content: str) -> list[CodeSymbol]:\n    symbols: list[CodeSymbol] = []\n    tree = ast.parse(content)\n    for node in ast.walk(tree):\n        if isinstance(node, ast.ClassDef):\n            symbols.append(CodeSymbol(name=node.name, kind=\"class\", filePath=file_path, startLine=node.lineno, endLine=getattr(node, \"end_lineno\", node.lineno)))\n        if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):\n            symbols.append(CodeSymbol(name=node.name, kind=\"function\", filePath=file_path, startLine=node.lineno, endLine=getattr(node, \"end_lineno\", node.lineno)))\n    return symbols\n\n\ndef _extract_imports(language: str, content: str) -> list[str]:\n    imports: set[str] = set()\n    if language == \"Python\":\n        try:\n            tree = ast.parse(content)\n        except SyntaxError:\n            return []\n        for node in ast.walk(tree):\n            if isinstance(node, ast.Import):\n                imports.update(alias.name for alias in node.names)\n            elif isinstance(node, ast.ImportFrom) and node.module:\n                imports.add(node.module)\n    else:\n        for pattern in [r\"import\\s+.*?\\s+from\\s+['\\\"]([^'\\\"]+)\", r\"import\\s+['\\\"]([^'\\\"]+)\", r\"#include\\s+[<\\\"]([^>\\\"]+)\"]:\n            imports.update(re.findall(pattern, content))\n    return sorted(imports)\n\n\ndef _chunk_file(repository_id: str, file_path: str, language: str, lines: list[str], imports: list[str], symbols: list[CodeSymbol]) -> list[CodeChunk]:\n    chunks: list[CodeChunk] = []\n    symbol_ranges = sorted(symbols, key=lambda item: item.startLine)\n    for symbol in symbol_ranges:\n        content = \"\\n\".join(lines[symbol.startLine - 1 : symbol.endLine])\n        if content.strip():\n            chunks.append(_chunk(repository_id, file_path, language, symbol.startLine, symbol.endLine, content, imports, symbol))\n\n    covered = {(symbol.startLine, symbol.endLine) for symbol in symbol_ranges}\n    if not covered or len(lines) > 200:\n        window = 120\n        for start in range(1, len(lines) + 1, window):\n            end = min(start + window - 1, len(lines))\n            content = \"\\n\".join(lines[start - 1 : end])\n            if content.strip():\n                chunks.append(_chunk(repository_id, file_path, language, start, end, content, imports, None))\n    return chunks\n\n\ndef _chunk(repository_id: str, file_path: str, language: str, start: int, end: int, content: str, imports: list[str], symbol: CodeSymbol | None):\n    digest = hashlib.sha1(f\"{file_path}:{start}:{end}:{content[:80]}\".encode()).hexdigest()[:12]\n    return CodeChunk(id=f\"{repository_id}:{digest}\", repositoryId=repository_id, filePath=file_path, language=language, startLine=start, endLine=end, content=content[:12000], symbol=symbol, imports=imports)\n\n\ndef _guess_block_end(lines: list[str], start_line: int) -> int:\n    return min(len(lines), start_line + 80)\n"}, {"path": "services/embedding-service/main.py", "filename": "main.py", "category": "Python FastAPI Microservices", "desc": "FastAPI wrapper endpoint that maps repository analysis chunks, prepends semantic metadata parameters to the text prompts, computes vectors in batches, and indexes them inside ChromaDB collections.", "lines_explain": [{"range": "1-10", "text": "Imports FastAPI, shared library models and indexing/embedding helper modules."}, {"range": "13-17", "text": "Defines the `/health` endpoint to verify the service status."}, {"range": "20-26", "text": "Defines the `/repositories/{repository_id}/index` endpoint. It receives the `RepositoryAnalysis` Pydantic payload, serializes chunks, builds rich preprocessed texts via `_embedding_text`, encodes them, and upserts them to ChromaDB."}, {"range": "28-36", "text": "Defines the helper `_embedding_text`. It prepends the file path, coding language, and active symbol name to the raw source content. Prepending this metadata maps semantic keyword properties to the vector space, enhancing RAG retrieval relevance."}, {"range": "38-44", "text": "Implements `/repositories/{repository_id}/search` endpoint to query ChromaDB for semantic similarity tests."}], "code": "from __future__ import annotations\n\nfrom fastapi import FastAPI\n\nfrom common.embeddings import embed_texts\nfrom common.models import RepositoryAnalysis, SearchRequest\nfrom common.vector_store import query_chunks, upsert_chunks\n\napp = FastAPI(title=\"CodeInsight Embedding Service\", version=\"0.1.0\")\n\n\n@app.get(\"/health\")\ndef health():\n    return {\"ok\": True, \"service\": \"embedding-service\"}\n\n\n@app.post(\"/repositories/{repository_id}/index\")\ndef index_repository(repository_id: str, analysis: RepositoryAnalysis):\n    chunks = [chunk.model_dump() for chunk in analysis.chunks]\n    texts = [_embedding_text(chunk) for chunk in chunks]\n    embeddings = embed_texts(texts)\n    return upsert_chunks(repository_id, chunks, embeddings)\n\n\n@app.post(\"/repositories/{repository_id}/search\")\ndef semantic_search(repository_id: str, request: SearchRequest):\n    embedding = embed_texts([request.query])[0]\n    results = query_chunks(repository_id, embedding, request.limit)\n    return {\"results\": results}\n\n\ndef _embedding_text(chunk: dict) -> str:\n    symbol = chunk.get(\"symbol\") or {}\n    return \"\\n\".join(\n        [\n            f\"file: {chunk['filePath']}\",\n            f\"language: {chunk['language']}\",\n            f\"symbol: {symbol.get('name', '')}\",\n            chunk[\"content\"],\n        ]\n    )\n"}, {"path": "services/rag-service/main.py", "filename": "main.py", "category": "Python FastAPI Microservices", "desc": "Retrieval-Augmented Generation service. It receives query payloads, searches ChromaDB collections, dynamically injects matching code blocks as contexts in prompt templates, and streams answers with citations.", "lines_explain": [{"range": "1-12", "text": "Imports FastAPI, JSON serializers, async streaming bindings, Pydantic, and shared vector store and completions modules."}, {"range": "15-20", "text": "Health probe routing endpoint returning status information."}, {"range": "22-44", "text": "Implements `/repositories/{repository_id}/chat/stream`. It converts the query to a vector, fetches the top 8 code chunks from ChromaDB, compiles the dynamic prompt template via `_build_prompt`, and starts an asynchronous token event stream generator (`events()`)."}, {"range": "46-60", "text": "Defines the async generator `events()`. It streams tokens from the LLM, escaping newlines (`\\n`) to conform to SSE specification guidelines. After the LLM output completes, it serializes a list of citations containing source directories, start/end lines and sends them as a custom event, concluding with a `done` signal."}, {"range": "62-75", "text": "Implements `_build_prompt` to format RAG prompts. It constructs a system prompt telling the LLM to write replies strictly from the provided context blocks, listing each context chunk with numbered headers."}], "code": "from __future__ import annotations\n\nfrom fastapi import FastAPI\nfrom fastapi.responses import StreamingResponse\n\nfrom common.embeddings import embed_texts\nfrom common.llm import stream_complete\nfrom common.models import RagRequest\nfrom common.vector_store import query_chunks\n\napp = FastAPI(title=\"CodeInsight RAG Service\", version=\"0.1.0\")\n\n\n@app.get(\"/health\")\ndef health():\n    return {\"ok\": True, \"service\": \"rag-service\"}\n\n\n@app.post(\"/repositories/{repository_id}/chat/stream\")\nasync def chat_stream(repository_id: str, request: RagRequest):\n    embedding = embed_texts([request.query])[0]\n    contexts = query_chunks(repository_id, embedding, 8)\n    prompt = _build_prompt(request.query, contexts)\n\n    async def events():\n        async for token in stream_complete(prompt):\n            escaped_token = token.replace(\"\\n\", \"\\\\n\")\n            yield f\"data: {escaped_token}\\n\\n\"\n        citations = [\n            {\n                \"filePath\": item[\"metadata\"].get(\"filePath\"),\n                \"startLine\": item[\"metadata\"].get(\"startLine\"),\n                \"endLine\": item[\"metadata\"].get(\"endLine\"),\n            }\n            for item in contexts\n        ]\n        import json\n\n        yield f\"event: citations\\ndata: {json.dumps(citations)}\\n\\n\"\n        yield \"event: done\\ndata: {}\\n\\n\"\n\n    return StreamingResponse(events(), media_type=\"text/event-stream\")\n\n\ndef _build_prompt(query: str, contexts: list[dict]) -> str:\n    context_text = \"\\n\\n\".join(\n        f\"[{idx + 1}] {item['metadata'].get('filePath')}:{item['metadata'].get('startLine')}-{item['metadata'].get('endLine')}\\n{item['content']}\"\n        for idx, item in enumerate(contexts)\n    )\n    return f\"\"\"Answer the developer's repository question using only the retrieved code context.\nBe specific, cite file paths and line ranges, and call out uncertainty.\n\nQuestion:\n{query}\n\nRetrieved context:\n{context_text}\n\"\"\"\n"}, {"path": "services/documentation-service/main.py", "filename": "main.py", "category": "Python FastAPI Microservices", "desc": "Generates complete documentation suites (including README files, REST API notes, setup commands, and directory layouts) by compiling parsed symbols into LLM prompts.", "lines_explain": [{"range": "1-12", "text": "Imports FastAPI, shared completions, and standard models library."}, {"range": "15-18", "text": "Defines the health check probe endpoint."}, {"range": "20-38", "text": "Defines `/repositories/{repository_id}/generate`. It aggregates symbols and file inventories into an overview prompt, calls the LLM in a blocking completion request (`complete`), and returns markdown blocks for the README, architecture notes, setup commands, and modules list."}, {"range": "40-44", "text": "Implements `_overview`. It maps the first 80 files and 120 symbols into a concise inventory list to avoid exceeding LLM context limits."}, {"range": "46-49", "text": "Implements `_architecture_summary`. Returns a summary of file counts and languages mapped in the project."}, {"range": "51-61", "text": "Implements `_setup_guide`. Analyzes the repository inventory. If it detects `package.json`, it returns npm commands. If it finds `requirements.txt`, it returns python virtualenv and uvicorn commands. Otherwise, it returns general setup instructions."}, {"range": "63-74", "text": "Implements `_module_summaries`. Scans directory structures and returns a summary list detailing the name, file count, and languages for each module folder."}], "code": "from __future__ import annotations\n\nfrom fastapi import FastAPI\n\nfrom common.llm import complete\nfrom common.models import RepositoryAnalysis\n\napp = FastAPI(title=\"CodeInsight Documentation Service\", version=\"0.1.0\")\n\n\n@app.get(\"/health\")\ndef health():\n    return {\"ok\": True, \"service\": \"documentation-service\"}\n\n\n@app.post(\"/repositories/{repository_id}/generate\")\nasync def generate_docs(repository_id: str, analysis: RepositoryAnalysis):\n    overview = _overview(analysis)\n    prompt = f\"\"\"Generate production-quality developer documentation for this repository.\nInclude README, API notes, architecture summary, setup guide, and module explanations.\nKeep it concrete and grounded in the supplied repository inventory.\n\nRepository inventory:\n{overview}\n\"\"\"\n    generated = await complete(prompt, system=\"You write concise, accurate engineering documentation from code analysis.\")\n    return {\n        \"repositoryId\": repository_id,\n        \"readme\": generated,\n        \"architecture\": _architecture_summary(analysis),\n        \"setup\": _setup_guide(analysis),\n        \"modules\": _module_summaries(analysis),\n    }\n\n\ndef _overview(analysis: RepositoryAnalysis) -> str:\n    top_files = \"\\n\".join(f\"- {file.path} ({file.language})\" for file in analysis.files[:80])\n    symbols = \"\\n\".join(f\"- {symbol.kind}: {symbol.name} in {symbol.filePath}:{symbol.startLine}\" for symbol in analysis.symbols[:120])\n    return f\"Summary: {analysis.summary}\\n\\nFiles:\\n{top_files}\\n\\nSymbols:\\n{symbols}\"\n\n\ndef _architecture_summary(analysis: RepositoryAnalysis) -> str:\n    languages = \", \".join(f\"{name}: {count}\" for name, count in analysis.summary.get(\"languages\", {}).items())\n    return f\"This repository contains {analysis.summary.get('fileCount', 0)} source files across {languages}.\"\n\n\ndef _setup_guide(analysis: RepositoryAnalysis) -> str:\n    paths = {file.path.lower() for file in analysis.files}\n    commands = []\n    if \"package.json\" in paths:\n        commands += [\"npm install\", \"npm run dev\"]\n    if \"requirements.txt\" in paths or \"pyproject.toml\" in paths:\n        commands += [\"python -m venv .venv\", \"pip install -r requirements.txt\", \"uvicorn main:app --reload\"]\n    if not commands:\n        commands.append(\"Inspect project-specific setup files and run the language-appropriate build/test commands.\")\n    return \"\\n\".join(f\"- `{command}`\" for command in commands)\n\n\ndef _module_summaries(analysis: RepositoryAnalysis):\n    modules: dict[str, dict] = {}\n    for file in analysis.files:\n        root = file.path.split(\"/\")[0]\n        modules.setdefault(root, {\"files\": 0, \"languages\": set()})\n        modules[root][\"files\"] += 1\n        modules[root][\"languages\"].add(file.language)\n    return [\n        {\"module\": name, \"files\": data[\"files\"], \"languages\": sorted(data[\"languages\"])}\n        for name, data in sorted(modules.items())\n    ]\n"}, {"path": "services/analysis-service/main.py", "filename": "main.py", "category": "Python FastAPI Microservices", "desc": "Converts file declarations and dependency edges into styled Node and Edge schemas suitable for rendering interactive dependency graphs in the client's React Flow interface.", "lines_explain": [{"range": "1-15", "text": "Imports FastAPI, Pydantic, and RepositoryAnalysis models."}, {"range": "18-20", "text": "Returns health check data."}, {"range": "22-35", "text": "Defines the `/graph` endpoint. It maps file lists to React Flow file nodes, and symbol lists (classes, functions, APIs) to symbol nodes. It maps dependency edges, resolving parent-child containment relationships (`contains`) to distinct node IDs, returning the compiled graph payload."}, {"range": "38-53", "text": "Defines `/explain` to provide summaries. It filters symbols matching a requested file, extracts dependency edges, fetches the file's raw content, and calls `_purpose` to return file-level purpose statements."}, {"range": "56-62", "text": "Implements `_purpose`. If symbols are found, it lists them. Otherwise, it extracts the first 12 lines of file content as a preview snippet."}], "code": "from __future__ import annotations\n\nfrom fastapi import FastAPI\nfrom pydantic import BaseModel\n\nfrom common.models import RepositoryAnalysis\n\napp = FastAPI(title=\"CodeInsight Analysis Service\", version=\"0.1.0\")\n\n\nclass ExplainRequest(BaseModel):\n    filePath: str\n    symbolName: str | None = None\n    analysis: RepositoryAnalysis\n\n\n@app.get(\"/health\")\ndef health():\n    return {\"ok\": True, \"service\": \"analysis-service\"}\n\n\n@app.post(\"/repositories/{repository_id}/graph\")\ndef graph(repository_id: str, analysis: RepositoryAnalysis):\n    file_nodes = [{\"id\": file.path, \"type\": \"file\", \"label\": file.path, \"language\": file.language} for file in analysis.files]\n    symbol_nodes = [\n        {\"id\": f\"{symbol.filePath}:{symbol.name}\", \"type\": symbol.kind, \"label\": symbol.name, \"filePath\": symbol.filePath}\n        for symbol in analysis.symbols[:250]\n    ]\n    edges = []\n    for edge in analysis.dependencies[:500]:\n        target = edge.target\n        if edge.kind == \"contains\":\n            target = f\"{edge.source}:{edge.target}\"\n        edges.append({\"id\": f\"{edge.source}->{target}:{edge.kind}\", \"source\": edge.source, \"target\": target, \"label\": edge.kind})\n    return {\"repositoryId\": repository_id, \"nodes\": file_nodes + symbol_nodes, \"edges\": edges}\n\n\n@app.post(\"/repositories/{repository_id}/explain\")\ndef explain(repository_id: str, request: ExplainRequest):\n    candidates = [\n        symbol for symbol in request.analysis.symbols\n        if symbol.filePath == request.filePath and (request.symbolName is None or symbol.name == request.symbolName)\n    ]\n    related_edges = [edge for edge in request.analysis.dependencies if edge.source == request.filePath or edge.target == request.filePath]\n    file_info = next((file for file in request.analysis.files if file.path == request.filePath), None)\n\n    return {\n        \"repositoryId\": repository_id,\n        \"filePath\": request.filePath,\n        \"symbols\": candidates,\n        \"dependencies\": related_edges,\n        \"purpose\": _purpose(file_info.content if file_info else \"\", candidates),\n    }\n\n\ndef _purpose(content: str, symbols: list) -> str:\n    names = \", \".join(symbol.name for symbol in symbols[:8])\n    if names:\n        return f\"This module defines {names} and participates in the dependency graph through its imports and contained symbols.\"\n    first_lines = \"\\n\".join(content.splitlines()[:12]).strip()\n    return first_lines or \"No source preview was available for this module.\"\n"}, {"path": "services/minigpt-service/main.py", "filename": "main.py", "category": "Python FastAPI Microservices", "desc": "FastAPI controller managing the educational GPT training lab. It handles training sessions, batch optimization iterations, and text generation outputs using in-memory model instances.", "lines_explain": [{"range": "1-15", "text": "Imports FastAPI, typing frameworks, Pydantic models, and the local NumPy transformer implementation `LabSession`."}, {"range": "18-28", "text": "Initializes a fallback default training dataset text string, reading `sample_dataset.txt` if available on disk."}, {"range": "30-47", "text": "Declares Pydantic schemas validating network request bodies for initialization parameters, training hyperparameters, and generation configurations."}, {"range": "49-51", "text": "Health check endpoint definition."}, {"range": "53-80", "text": "Defines the `/lab/init` endpoint. It instantiates a model in memory as a global `active_session`, passing dimensions (layers, heads, dimensions, block size). It returns vocabulary metadata and corpus lengths."}, {"range": "83-97", "text": "Defines the `/lab/train-step` endpoint. It executes training steps using a learning rate and batch sizes, and returns computed loss histories."}, {"range": "100-115", "text": "Defines `/lab/generate`. It samples text starting from a seed string, using temperature scaling and top-k logit filtering, and returns the generated text and computed attention weights maps."}, {"range": "118-136", "text": "Defines `/lab/state` returning active hyperparameters, vocab size, optimization steps, and training logs."}, {"range": "139-146", "text": "Defines `/lab/wikitext` to return contents of `wikitext_dataset.txt` for advanced model training."}], "code": "from __future__ import annotations\nfrom fastapi import FastAPI, HTTPException\nfrom pydantic import BaseModel\nfrom typing import Any\n\ntry:\n    from service.model import LabSession\nexcept ImportError:\n    from model import LabSession\n\napp = FastAPI(title=\"CodeInsight MiniGPT Service\", version=\"0.1.0\")\n\n# Singleton in-memory active session\nactive_session: LabSession | None = None\n\nimport os\n\n# Try to load custom sample text, otherwise fallback to hardcoded string\nsample_path = os.path.join(os.path.dirname(__file__), \"sample_dataset.txt\")\nif os.path.exists(sample_path):\n    with open(sample_path, \"r\", encoding=\"utf-8\") as f:\n        DEFAULT_CORPUS = f.read()\nelse:\n    DEFAULT_CORPUS = (\n        \"SYSTEM: Hello Creator. I am now active.\\n\"\n        \"CREATOR: Hello. Can you hear me clearly?\\n\"\n        \"SYSTEM: Yes. Signals stabilized.\\n\"\n    )\n\nclass InitRequest(BaseModel):\n    text: str | None = None\n    n_layer: int = 2\n    n_head: int = 4\n    n_embd: int = 64\n    block_size: int = 32\n\nclass TrainRequest(BaseModel):\n    lr: float = 1e-3\n    batch_size: int = 16\n    steps: int = 5\n\nclass GenerateRequest(BaseModel):\n    seed: str = \" \"\n    max_new_tokens: int = 50\n    temperature: float = 1.0\n    top_k: int = 10\n\n\n@app.get(\"/health\")\ndef health():\n    return {\"ok\": True, \"service\": \"minigpt-service\"}\n\n\n@app.post(\"/lab/init\")\ndef init_lab(req: InitRequest):\n    global active_session\n    text = req.text if (req.text and req.text.strip()) else DEFAULT_CORPUS\n    \n    try:\n        active_session = LabSession(\n            text=text,\n            n_layer=req.n_layer,\n            n_head=req.n_head,\n            n_embd=req.n_embd,\n            block_size=req.block_size\n        )\n        return {\n            \"initialized\": True,\n            \"vocabSize\": active_session.tokenizer.vocab_size,\n            \"chars\": active_session.tokenizer.chars,\n            \"corpusLength\": len(text),\n            \"hyperparameters\": {\n                \"n_layer\": active_session.n_layer,\n                \"n_head\": active_session.n_head,\n                \"n_embd\": active_session.n_embd,\n                \"block_size\": active_session.block_size\n            }\n        }\n    except Exception as e:\n        raise HTTPException(status_code=500, detail=f\"Failed to initialize lab: {str(e)}\")\n\n\n@app.post(\"/lab/train-step\")\ndef train_step(req: TrainRequest):\n    global active_session\n    if active_session is None:\n        raise HTTPException(status_code=400, detail=\"Lab session is not initialized. Call /lab/init first.\")\n        \n    try:\n        result = active_session.train_step(\n            lr=req.lr,\n            batch_size=req.batch_size,\n            steps=req.steps\n        )\n        return result\n    except Exception as e:\n        raise HTTPException(status_code=500, detail=f\"Training step failed: {str(e)}\")\n\n\n@app.post(\"/lab/generate\")\ndef generate_text(req: GenerateRequest):\n    global active_session\n    if active_session is None:\n        raise HTTPException(status_code=400, detail=\"Lab session is not initialized. Call /lab/init first.\")\n        \n    try:\n        result = active_session.generate(\n            seed=req.seed,\n            max_new_tokens=req.max_new_tokens,\n            temperature=req.temperature,\n            top_k=req.top_k\n        )\n        return result\n    except Exception as e:\n        raise HTTPException(status_code=500, detail=f\"Text generation failed: {str(e)}\")\n\n\n@app.get(\"/lab/state\")\ndef get_state():\n    global active_session\n    if active_session is None:\n        return {\"initialized\": False}\n        \n    return {\n        \"initialized\": True,\n        \"vocabSize\": active_session.tokenizer.vocab_size,\n        \"corpusLength\": len(active_session.text),\n        \"step\": active_session.step_counter,\n        \"lossHistory\": active_session.loss_history,\n        \"hyperparameters\": {\n            \"n_layer\": active_session.n_layer,\n            \"n_head\": active_session.n_head,\n            \"n_embd\": active_session.n_embd,\n            \"block_size\": active_session.block_size\n        }\n    }\n\n\n@app.get(\"/lab/wikitext\")\ndef get_wikitext():\n    path = os.path.join(os.path.dirname(__file__), \"wikitext_dataset.txt\")\n    if os.path.exists(path):\n        with open(path, \"r\", encoding=\"utf-8\") as f:\n            return {\"text\": f.read()}\n    raise HTTPException(status_code=404, detail=\"Wikitext file not found\")\n"}, {"path": "services/minigpt-service/model.py", "filename": "model.py", "category": "Python FastAPI Microservices", "desc": "A complete, educational, from-scratch NumPy implementation of a Causal Generative Pre-trained Transformer. It implements self-attention, multi-head projections, causal masking, layer normalizations, GELU activations, manual backpropagation gradients, Adam optimizer iterations, and gradient clipping.", "lines_explain": [{"range": "1-3", "text": "Imports NumPy for performing high-performance matrix algebra calculations."}, {"range": "4-17", "text": "Implements `SimpleCharTokenizer`. It constructs a character vocabulary map (`stoi` and `itos`) from a training text corpus, converting strings to list of token IDs and back."}, {"range": "19-30", "text": "Implements Gaussian Error Linear Unit (`gelu_forward` and its derivative `gelu_backward`). GELU scales inputs by a cumulative distribution function approximation, smoothing out gradient transitions to prevent dead neurons during backprop."}, {"range": "32-53", "text": "Implements layer normalization (`layernorm_forward` and `layernorm_backward`). Normalizes weights along feature dimensions (mean=0, variance=1) and scales them using gamma and beta. The backward pass manually derives the partial derivative gradients of inputs and parameters."}, {"range": "55-100", "text": "Declares the `NumPyCausalGPT` network class. The constructor initializes weight tables: Token Embedding (`Wte`), Positional Embedding (`Wpe`), layer weights (attention projections Q/K/V/O, MLP layers W1/W2/b1/b2, norms gamma/beta), final LM Head (`Wlm`), and Adam optimization state variables (t, m, v)."}, {"range": "101-199", "text": "Implements the forward pass. Positional embeddings are added to token embeddings. For each layer, it normalizes inputs, projects Q/K/V matrices, splits features into attention heads, calculates dot-product attention scores scaled by dimension size, applies causal masking, computes softmax probabilities, applies residual links, normalizes MLP inputs, and calculates GELU outputs. Finally, it applies layer normalization and projects logits using the LM Head, caching intermediates for the backward pass."}, {"range": "200-330", "text": "Implements manual backpropagation (`backward`). It derives gradients through cross-entropy loss, language model heads, layer norms, MLPs, GELU activations, and multi-head causal self-attention parameters (accumulating parameter gradients across dimensions). Finally, it computes token and positional embedding gradients, returning the compiled gradients map."}, {"range": "331-338", "text": "Implements `clip_grad_norm_`. It computes the L2 norm across parameter gradients. If the norm exceeds a threshold (e.g. 1.0), it scales the gradients down, preventing exploding gradients from destabilizing training."}, {"range": "340-359", "text": "Implements parameter updates using the `Adam` optimizer. It computes moving averages of gradients (`m`) and squared gradients (`v`), corrects bias terms, and updates network parameter weights using standard Adam updates."}, {"range": "361-410", "text": "Declares `LabSession`. The constructor validates network hyperparameters, enforces safe parameter bounds, builds datasets (90/10 train/val split), encodes the corpus, and initializes the `NumPyCausalGPT` model. It also provides a `get_batch` helper to randomly sample batch indexes."}, {"range": "412-419", "text": "Implements cross-entropy loss computation, calculating probabilities at target index coordinates to output the mean negative log-likelihood loss."}, {"range": "421-464", "text": "Implements the `train_step` loop. Runs forward passes, computes cross-entropy loss, executes manual backpropagation gradients, clips gradients, updates weights using Adam, logs training stats, and evaluates val loss."}, {"range": "466-469", "text": "Evaluates validation loss on the validation dataset split."}, {"range": "471-528", "text": "Implements text generation sampling. Given a seed string, it encodes inputs. For each step, it slices the context, runs a forward pass to retrieve logits, divides logits by temperature, applies top-k logit filtering, runs random choice sampling, and appends the token ID. It decodes the text and retrieves causal attention weights to map query-key interactions for visual rendering on the client."}], "code": "from __future__ import annotations\nimport numpy as np\n\nclass SimpleCharTokenizer:\n    def __init__(self, text: str):\n        self.chars = sorted(list(set(text)))\n        if not self.chars:\n            self.chars = [\" \"]  # Fallback for empty corpus\n        self.vocab_size = len(self.chars)\n        self.stoi = {ch: i for i, ch in enumerate(self.chars)}\n        self.itos = {i: ch for i, ch in enumerate(self.chars)}\n\n    def encode(self, s: str) -> list[int]:\n        return [self.stoi.get(c, 0) for c in s]\n\n    def decode(self, ids: list[int]) -> str:\n        return \"\".join([self.itos.get(i, \" \") for i in ids])\n\ndef gelu_forward(x):\n    \"\"\"GELU activation used in GPT-2. Smoother than ReLU, converges better.\"\"\"\n    return 0.5 * x * (1.0 + np.tanh(np.sqrt(2.0 / np.pi) * (x + 0.044715 * x ** 3)))\n\ndef gelu_backward(dout, x):\n    \"\"\"Backward pass for GELU activation.\"\"\"\n    tanh_arg = np.sqrt(2.0 / np.pi) * (x + 0.044715 * x ** 3)\n    tanh_val = np.tanh(tanh_arg)\n    dtanh = 1.0 - tanh_val ** 2\n    sech2_term = dtanh * np.sqrt(2.0 / np.pi) * (1.0 + 3.0 * 0.044715 * x ** 2)\n    dgelu = 0.5 * (1.0 + tanh_val) + 0.5 * x * sech2_term\n    return dout * dgelu\n\ndef layernorm_forward(x, gamma, beta, eps=1e-5):\n    mean = np.mean(x, axis=-1, keepdims=True)\n    var = np.var(x, axis=-1, keepdims=True)\n    x_norm = (x - mean) / np.sqrt(var + eps)\n    out = gamma * x_norm + beta\n    cache = (x, mean, var, x_norm, gamma)\n    return out, cache\n\ndef layernorm_backward(dout, cache, eps=1e-5):\n    x, mean, var, x_norm, gamma = cache\n    C = x.shape[-1]\n    \n    dgamma = np.sum(dout * x_norm, axis=(0, 1))\n    dbeta = np.sum(dout, axis=(0, 1))\n    \n    dx_norm = dout * gamma\n    dx = (1.0 / C) / np.sqrt(var + eps) * (\n        C * dx_norm - \n        np.sum(dx_norm, axis=-1, keepdims=True) - \n        x_norm * np.sum(dx_norm * x_norm, axis=-1, keepdims=True)\n    )\n    return dx, dgamma, dbeta\n\nclass NumPyCausalGPT:\n    def __init__(self, vocab_size: int, n_layer: int, n_head: int, n_embd: int, block_size: int):\n        self.vocab_size = vocab_size\n        self.n_layer = n_layer\n        self.n_head = n_head\n        self.n_embd = n_embd\n        self.block_size = block_size\n        \n        # Initialize token and positional embeddings\n        self.Wte = np.random.randn(vocab_size, n_embd) * 0.02\n        self.Wpe = np.random.randn(block_size, n_embd) * 0.02\n        \n        # Initialize final LayerNorm parameters\n        self.gamma_f = np.ones((n_embd,))\n        self.beta_f = np.zeros((n_embd,))\n        \n        # Initialize layered parameters\n        for i in range(n_layer):\n            # Pre-LN LayerNorm parameters\n            setattr(self, f\"gamma1_{i}\", np.ones((n_embd,)))\n            setattr(self, f\"beta1_{i}\", np.zeros((n_embd,)))\n            setattr(self, f\"gamma2_{i}\", np.ones((n_embd,)))\n            setattr(self, f\"beta2_{i}\", np.zeros((n_embd,)))\n            \n            # Query, Key, Value weight matrices\n            setattr(self, f\"Wq_{i}\", np.random.randn(n_embd, n_embd) / np.sqrt(n_embd))\n            setattr(self, f\"Wk_{i}\", np.random.randn(n_embd, n_embd) / np.sqrt(n_embd))\n            setattr(self, f\"Wv_{i}\", np.random.randn(n_embd, n_embd) / np.sqrt(n_embd))\n            \n            # Attention output projection weight\n            setattr(self, f\"Wo_{i}\", np.random.randn(n_embd, n_embd) / np.sqrt(n_embd))\n            \n            # Feedforward MLP parameters\n            setattr(self, f\"W1_{i}\", np.random.randn(n_embd, 4 * n_embd) / np.sqrt(n_embd))\n            setattr(self, f\"b1_{i}\", np.zeros((1, 4 * n_embd)))\n            setattr(self, f\"W2_{i}\", np.random.randn(4 * n_embd, n_embd) / np.sqrt(4 * n_embd))\n            setattr(self, f\"b2_{i}\", np.zeros((1, n_embd)))\n            \n        # Language model head projection weight\n        self.Wlm = np.random.randn(n_embd, vocab_size) / np.sqrt(n_embd)\n        \n        # Adam Optimizer states\n        self.m = {}\n        self.v = {}\n        self.t = 0\n\n    def forward(self, idx: np.ndarray) -> tuple[np.ndarray, dict]:\n        B, T = idx.shape\n        assert T <= self.block_size, f\"Context length {T} exceeds block size {self.block_size}\"\n        \n        # Embeddings\n        tok_emb = self.Wte[idx]  # (B, T, n_embd)\n        pos = np.arange(T)\n        pos_emb = self.Wpe[pos]  # (T, n_embd)\n        z = tok_emb + pos_emb  # (B, T, n_embd)\n        \n        cache = {\"idx\": idx, \"z_0\": z}\n        \n        h = self.n_head\n        d = self.n_embd // h\n        scale = 1.0 / np.sqrt(d)\n        mask = np.tril(np.ones((T, T)))\n        \n        for i in range(self.n_layer):\n            Wq = getattr(self, f\"Wq_{i}\")\n            Wk = getattr(self, f\"Wk_{i}\")\n            Wv = getattr(self, f\"Wv_{i}\")\n            Wo = getattr(self, f\"Wo_{i}\")\n            W1 = getattr(self, f\"W1_{i}\")\n            b1 = getattr(self, f\"b1_{i}\")\n            W2 = getattr(self, f\"W2_{i}\")\n            b2 = getattr(self, f\"b2_{i}\")\n            \n            gamma1 = getattr(self, f\"gamma1_{i}\")\n            beta1 = getattr(self, f\"beta1_{i}\")\n            gamma2 = getattr(self, f\"gamma2_{i}\")\n            beta2 = getattr(self, f\"beta2_{i}\")\n            \n            z_in = z\n            \n            # LayerNorm 1 (Pre-Attention)\n            ln1, ln1_cache = layernorm_forward(z_in, gamma1, beta1)\n            \n            # Projections\n            Q = ln1 @ Wq  # (B, T, C)\n            K = ln1 @ Wk  # (B, T, C)\n            V = ln1 @ Wv  # (B, T, C)\n            \n            # Split heads\n            Q_heads = Q.reshape(B, T, h, d).transpose(0, 2, 1, 3)  # (B, h, T, d)\n            K_heads = K.reshape(B, T, h, d).transpose(0, 2, 1, 3)  # (B, h, T, d)\n            V_heads = V.reshape(B, T, h, d).transpose(0, 2, 1, 3)  # (B, h, T, d)\n            \n            # Scaled causal self-attention\n            scores = (Q_heads @ K_heads.transpose(0, 1, 3, 2)) * scale  # (B, h, T, T)\n            scores = np.where(mask == 0, -np.inf, scores)\n            \n            exp_scores = np.exp(scores - np.max(scores, axis=-1, keepdims=True))\n            A = exp_scores / np.sum(exp_scores, axis=-1, keepdims=True)  # (B, h, T, T)\n            \n            # Context output\n            Y_heads = A @ V_heads  # (B, h, T, d)\n            Y = Y_heads.transpose(0, 2, 1, 3).reshape(B, T, self.n_embd)  # (B, T, C)\n            \n            # Output projection and Attention Residual connection\n            attn_out = Y @ Wo  # (B, T, C)\n            z_mid = z_in + attn_out  # (B, T, C)\n            \n            # LayerNorm 2 (Pre-MLP)\n            ln2, ln2_cache = layernorm_forward(z_mid, gamma2, beta2)\n            \n            # Feedforward MLP with GELU activation (same as GPT-2)\n            h_mlp = ln2 @ W1 + b1  # (B, T, 4*C)\n            h_gelu = gelu_forward(h_mlp)  # (B, T, 4*C)\n            mlp_out = h_gelu @ W2 + b2  # (B, T, C)\n            \n            # MLP Residual connection\n            z_out = z_mid + mlp_out  # (B, T, C)\n            \n            # Cache layer variables for backward pass\n            cache.update({\n                f\"z_in_{i}\": z_in, f\"ln1_cache_{i}\": ln1_cache, f\"ln1_{i}\": ln1,\n                f\"Q_{i}\": Q, f\"K_{i}\": K, f\"V_{i}\": V,\n                f\"Q_heads_{i}\": Q_heads, f\"K_heads_{i}\": K_heads, f\"V_heads_{i}\": V_heads,\n                f\"scores_{i}\": scores, f\"A_{i}\": A, f\"Y_heads_{i}\": Y_heads, f\"Y_{i}\": Y,\n                f\"attn_out_{i}\": attn_out, f\"z_mid_{i}\": z_mid,\n                f\"ln2_cache_{i}\": ln2_cache, f\"ln2_{i}\": ln2,\n                f\"h_mlp_{i}\": h_mlp, f\"h_gelu_{i}\": h_gelu, f\"mlp_out_{i}\": mlp_out,\n                f\"z_out_{i}\": z_out\n            })\n            \n            z = z_out\n            \n        # Final LayerNorm\n        z_final, ln_f_cache = layernorm_forward(z, self.gamma_f, self.beta_f)\n        logits = z_final @ self.Wlm\n        \n        cache.update({\n            \"z_final_pre_ln\": z,\n            \"ln_f_cache\": ln_f_cache,\n            \"z_final\": z_final\n        })\n        \n        return logits, cache\n\n    def backward(self, cache: dict, targets: np.ndarray) -> dict:\n        idx = cache[\"idx\"]\n        B, T = idx.shape\n        h = self.n_head\n        d = self.n_embd // h\n        scale = 1.0 / np.sqrt(d)\n        \n        # Softmax CrossEntropy Loss gradient\n        logits = cache[\"z_final\"] @ self.Wlm\n        exp_logits = np.exp(logits - np.max(logits, axis=-1, keepdims=True))\n        probs = exp_logits / np.sum(exp_logits, axis=-1, keepdims=True)  # (B, T, vocab_size)\n        \n        dlogits = probs.copy()\n        for b in range(B):\n            for t in range(T):\n                target_idx = targets[b, t]\n                dlogits[b, t, target_idx] -= 1.0\n        dlogits = dlogits / (B * T)\n        \n        # Language Model Head gradient\n        dWlm = np.tensordot(cache[\"z_final\"], dlogits, axes=([0, 1], [0, 1]))\n        dz_final = dlogits @ self.Wlm.T\n        \n        # Backprop final LayerNorm\n        dz, dgamma_f, dbeta_f = layernorm_backward(dz_final, cache[\"ln_f_cache\"])\n        \n        grads = {\n            \"Wlm\": dWlm,\n            \"gamma_f\": dgamma_f,\n            \"beta_f\": dbeta_f\n        }\n        \n        # Propagate back through layers in reverse order\n        for i in reversed(range(self.n_layer)):\n            Wq = getattr(self, f\"Wq_{i}\")\n            Wk = getattr(self, f\"Wk_{i}\")\n            Wv = getattr(self, f\"Wv_{i}\")\n            Wo = getattr(self, f\"Wo_{i}\")\n            W1 = getattr(self, f\"W1_{i}\")\n            W2 = getattr(self, f\"W2_{i}\")\n            \n            z_in = cache[f\"z_in_{i}\"]\n            ln1_cache = cache[f\"ln1_cache_{i}\"]\n            ln1 = cache[f\"ln1_{i}\"]\n            Q_heads = cache[f\"Q_heads_{i}\"]\n            K_heads = cache[f\"K_heads_{i}\"]\n            V_heads = cache[f\"V_heads_{i}\"]\n            A = cache[f\"A_{i}\"]\n            Y = cache[f\"Y_{i}\"]\n            z_mid = cache[f\"z_mid_{i}\"]\n            ln2_cache = cache[f\"ln2_cache_{i}\"]\n            ln2 = cache[f\"ln2_{i}\"]\n            h_mlp = cache[f\"h_mlp_{i}\"]\n            h_gelu = cache[f\"h_gelu_{i}\"]\n            \n            # MLP connection gradient flow splits: z_out = z_mid + mlp_out\n            dmlp_out = dz.copy()\n            dz_mid = dz.copy()\n            \n            # Backprop MLP parameters\n            dW2 = np.tensordot(h_gelu, dmlp_out, axes=([0, 1], [0, 1]))\n            db2 = np.sum(dmlp_out, axis=(0, 1)).reshape(1, -1)\n            dh_gelu = dmlp_out @ W2.T\n            \n            # GELU backward (replaces ReLU: dh_mlp = dh_relu * (h_mlp > 0))\n            dh_mlp = gelu_backward(dh_gelu, h_mlp)\n            \n            dW1 = np.tensordot(ln2, dh_mlp, axes=([0, 1], [0, 1]))\n            db1 = np.sum(dh_mlp, axis=(0, 1)).reshape(1, -1)\n            dln2 = dh_mlp @ W1.T\n            \n            # Backprop LayerNorm 2\n            dz_mid_from_mlp, dgamma2, dbeta2 = layernorm_backward(dln2, ln2_cache)\n            dz_mid += dz_mid_from_mlp\n            \n            # Attention connection gradient flow splits: z_mid = z_in + attn_out\n            dattn_out = dz_mid.copy()\n            dz_in = dz_mid.copy()\n            \n            # Backprop Attention parameters\n            dWo = np.tensordot(Y, dattn_out, axes=([0, 1], [0, 1]))\n            dY = dattn_out @ Wo.T\n            \n            dY_heads = dY.reshape(B, T, h, d).transpose(0, 2, 1, 3)\n            \n            dA = dY_heads @ V_heads.transpose(0, 1, 3, 2)\n            dV_heads = A.transpose(0, 1, 3, 2) @ dY_heads\n            \n            dA_sum = np.sum(dA * A, axis=-1, keepdims=True)\n            dscores = A * (dA - dA_sum)\n            dscores = np.where(np.tril(np.ones((T, T))) == 0, 0.0, dscores)\n            \n            dQ_heads = (dscores @ K_heads) * scale\n            dK_heads = (dscores.transpose(0, 1, 3, 2) @ Q_heads) * scale\n            \n            dQ = dQ_heads.transpose(0, 2, 1, 3).reshape(B, T, self.n_embd)\n            dK = dK_heads.transpose(0, 2, 1, 3).reshape(B, T, self.n_embd)\n            dV = dV_heads.transpose(0, 2, 1, 3).reshape(B, T, self.n_embd)\n            \n            dWq = np.tensordot(ln1, dQ, axes=([0, 1], [0, 1]))\n            dWk = np.tensordot(ln1, dK, axes=([0, 1], [0, 1]))\n            dWv = np.tensordot(ln1, dV, axes=([0, 1], [0, 1]))\n            \n            dln1 = dQ @ Wq.T + dK @ Wk.T + dV @ Wv.T\n            \n            # Backprop LayerNorm 1\n            dz_in_from_attn, dgamma1, dbeta1 = layernorm_backward(dln1, ln1_cache)\n            dz_in += dz_in_from_attn\n            \n            dz = dz_in\n            \n            grads.update({\n                f\"Wq_{i}\": dWq, f\"Wk_{i}\": dWk, f\"Wv_{i}\": dWv, f\"Wo_{i}\": dWo,\n                f\"W1_{i}\": dW1, f\"b1_{i}\": db1, f\"W2_{i}\": dW2, f\"b2_{i}\": db2,\n                f\"gamma1_{i}\": dgamma1, f\"beta1_{i}\": dbeta1,\n                f\"gamma2_{i}\": dgamma2, f\"beta2_{i}\": dbeta2\n            })\n            \n        # Token and Position Embedding gradients (vectorized)\n        dWte = np.zeros_like(self.Wte)\n        # np.add.at is faster for scatter-add than Python loops\n        np.add.at(dWte, idx.reshape(-1), dz.reshape(-1, self.n_embd))\n        \n        # Positional embedding gradient (sum over batch)\n        dWpe = np.zeros_like(self.Wpe)\n        for t in range(T):\n            dWpe[t] = dz[:, t, :].sum(axis=0)\n            \n        grads.update({\"Wte\": dWte, \"Wpe\": dWpe})\n        return grads\n\n    def clip_grad_norm_(self, grads: dict, max_norm: float = 1.0) -> float:\n        \"\"\"Clip gradients by global norm. Returns the norm before clipping.\"\"\"\n        total_norm = np.sqrt(sum(np.sum(g ** 2) for g in grads.values()))\n        if total_norm > max_norm:\n            clip_coeff = max_norm / (total_norm + 1e-8)\n            for name in grads:\n                grads[name] = grads[name] * clip_coeff\n        return float(total_norm)\n\n    def update_params(self, grads: dict, lr: float):\n        self.t += 1\n        beta1, beta2 = 0.9, 0.999\n        eps = 1e-8\n        \n        for name, grad in grads.items():\n            param = getattr(self, name)\n            \n            if name not in self.m:\n                self.m[name] = np.zeros_like(param)\n                self.v[name] = np.zeros_like(param)\n                \n            self.m[name] = beta1 * self.m[name] + (1 - beta1) * grad\n            self.v[name] = beta2 * self.v[name] + (1 - beta2) * (grad ** 2)\n            \n            m_hat = self.m[name] / (1 - beta1 ** self.t)\n            v_hat = self.v[name] / (1 - beta2 ** self.t)\n            \n            new_val = param - lr * m_hat / (np.sqrt(v_hat) + eps)\n            setattr(self, name, new_val)\n\nclass LabSession:\n    def __init__(self, text: str, n_layer: int = 2, n_head: int = 4, n_embd: int = 64, block_size: int = 32):\n        self.text = text\n        self.tokenizer = SimpleCharTokenizer(text)\n        \n        # Clean, safe logical parameter bounds\n        n_layer = max(1, min(n_layer, 4))\n        n_embd = max(16, min(n_embd, 128))\n        block_size = max(8, min(block_size, 64))\n        n_head = max(1, min(n_head, 8))\n        \n        # Ensure n_embd is divisible by n_head\n        if n_embd % n_head != 0:\n            divisors = [i for i in range(1, n_embd + 1) if n_embd % i == 0]\n            n_head = min(divisors, key=lambda x: abs(x - n_head))\n            \n        self.n_layer = n_layer\n        self.n_head = n_head\n        self.n_embd = n_embd\n        self.block_size = block_size\n        \n        # Generalized multi-layer, multi-head NumPy model\n        self.model = NumPyCausalGPT(\n            vocab_size=self.tokenizer.vocab_size,\n            n_layer=self.n_layer,\n            n_head=self.n_head,\n            n_embd=self.n_embd,\n            block_size=self.block_size\n        )\n        \n        # Datasets\n        data = self.tokenizer.encode(self.text)\n        n = int(0.9 * len(data))\n        self.train_data = np.array(data[:n], dtype=np.int32)\n        self.val_data = np.array(data[n:], dtype=np.int32)\n        \n        self.loss_history: list[dict] = []\n        self.step_counter = 0\n\n    def get_batch(self, split: str, batch_size: int) -> tuple[np.ndarray, np.n
