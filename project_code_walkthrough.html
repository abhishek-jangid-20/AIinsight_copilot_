darray]:\n        data = self.train_data if split == \"train\" else self.val_data\n        if len(data) <= self.block_size + 1:\n            x = np.zeros((batch_size, self.block_size), dtype=np.int32)\n            y = np.zeros((batch_size, self.block_size), dtype=np.int32)\n            return x, y\n            \n        ix = np.random.randint(0, len(data) - self.block_size, size=(batch_size,))\n        x = np.stack([data[i:i+self.block_size] for i in ix])\n        y = np.stack([data[i+1:i+self.block_size+1] for i in ix])\n        return x, y\n\n    def _cross_entropy_loss(self, logits: np.ndarray, targets: np.ndarray) -> float:\n        \"\"\"Vectorized cross-entropy loss.\"\"\"\n        B, T, C = logits.shape\n        exp_logits = np.exp(logits - np.max(logits, axis=-1, keepdims=True))\n        probs = exp_logits / np.sum(exp_logits, axis=-1, keepdims=True)\n        # Gather log-probs at target positions\n        log_probs = np.log(probs.reshape(B * T, C)[np.arange(B * T), targets.reshape(-1)] + 1e-15)\n        return float(-log_probs.mean())\n\n    def train_step(self, lr: float = 1e-2, batch_size: int = 16, steps: int = 1) -> dict:\n        accumulated_loss = 0.0\n        last_grad_norm = 0.0\n        for _ in range(steps):\n            x, y = self.get_batch(\"train\", batch_size)\n            logits, cache = self.model.forward(x)\n            \n            # Vectorized cross entropy\n            loss = self._cross_entropy_loss(logits, y)\n            \n            # Backpropagation\n            grads = self.model.backward(cache, y)\n            \n            # Gradient clipping (max_norm=1.0 prevents divergence)\n            last_grad_norm = self.model.clip_grad_norm_(grads, max_norm=1.0)\n            \n            # Apply parameter updates\n            self.model.update_params(grads, lr)\n            \n            accumulated_loss += loss\n            self.step_counter += 1\n        \n        # Compute val loss every 5 steps to save compute time (use cached otherwise)\n        if self.step_counter % 5 == 0 or not hasattr(self, \"_last_val_loss\"):\n            val_loss = self.evaluate_val_loss(batch_size=batch_size)\n            self._last_val_loss = val_loss\n        else:\n            val_loss = self._last_val_loss\n            \n        mean_train_loss = accumulated_loss / steps\n        \n        self.loss_history.append({\n            \"step\": self.step_counter,\n            \"trainLoss\": mean_train_loss,\n            \"valLoss\": val_loss\n        })\n        \n        return {\n            \"step\": self.step_counter,\n            \"trainLoss\": mean_train_loss,\n            \"valLoss\": val_loss,\n            \"gradNorm\": last_grad_norm,\n            \"lossHistory\": self.loss_history\n        }\n\n    def evaluate_val_loss(self, batch_size: int = 16) -> float:\n        x, y = self.get_batch(\"val\", batch_size)\n        logits, _ = self.model.forward(x)\n        return self._cross_entropy_loss(logits, y)\n\n    def generate(self, seed: str, max_new_tokens: int = 50, temperature: float = 1.0, top_k: int = 10) -> dict:\n        if not seed:\n            seed = \" \"\n            \n        seed_encoded = self.tokenizer.encode(seed)\n        input_tokens = list(seed_encoded)\n        \n        generated_tokens = []\n        for _ in range(max_new_tokens):\n            context_tokens = input_tokens[-self.block_size:]\n            x = np.array([context_tokens], dtype=np.int32)\n            \n            logits, _ = self.model.forward(x)\n            last_logits = logits[0, -1, :]\n            \n            if temperature == 0.0:\n                next_token_id = int(np.argmax(last_logits))\n            else:\n                last_logits = last_logits / temperature\n                # Top-k sampling: zero out all but the top-k logits\n                # This prevents the model from sampling random rare chars\n                k = min(top_k, len(last_logits))\n                top_k_threshold = np.sort(last_logits)[-k]\n                last_logits = np.where(last_logits < top_k_threshold, -np.inf, last_logits)\n                exp_logits = np.exp(last_logits - np.max(last_logits))\n                probs = exp_logits / np.sum(exp_logits)\n                next_token_id = int(np.random.choice(len(probs), p=probs))\n                \n            input_tokens.append(next_token_id)\n            generated_tokens.append(next_token_id)\n            \n        full_text = self.tokenizer.decode(input_tokens)\n        new_text = self.tokenizer.decode(generated_tokens)\n        \n        # Fetch actual causal attention maps for the generated context sequence\n        final_context = input_tokens[-self.block_size:]\n        x_final = np.array([final_context], dtype=np.int32)\n        _, cache = self.model.forward(x_final)\n        \n        formatted_maps = []\n        for layer_idx in range(self.n_layer):\n            layer_data = []\n            A_layer = cache[f\"A_{layer_idx}\"][0]  # Shape: (h, T, T)\n            for head_idx in range(self.n_head):\n                layer_data.append(A_layer[head_idx].tolist())\n            formatted_maps.append(layer_data)\n            \n        tokens_labels = [self.tokenizer.itos.get(tok_id, \" \") for tok_id in final_context]\n        \n        return {\n            \"seed\": seed,\n            \"generatedText\": new_text,\n            \"fullText\": full_text,\n            \"tokens\": final_context,\n            \"tokenLabels\": tokens_labels,\n            \"attentionMaps\": formatted_maps  # Real weights matching [layer][head][query][key]\n        }\n"}, {"path": "server/src/app.ts", "filename": "app.ts", "category": "API Gateway Node/Express Server", "desc": "Configures the Express server. It initializes security headers, sets up CORS rules, mounts body parsers, registers router modules, and attaches a global exception middleware handler.", "lines_explain": [{"range": "1-12", "text": "Imports Express, CORS controllers, routing paths, and global exception middlewares."}, {"range": "14-25", "text": "Initializes the Express server, applies CORS policies allowing requests from the Vite frontend port (`5173`), and configures JSON and URL-encoded body-parsing middlewares."}, {"range": "27-32", "text": "Mounts endpoints routing. Registers authentication endpoints at `/api/auth`, repository routes at `/api/repositories`, and MiniGPT educational routes at `/api/minigpt`."}, {"range": "34-36", "text": "Integrates the global error handler middleware, catching unhandled exceptions across all routing paths."}], "code": "import \"express-async-errors\";\nimport cors from \"cors\";\nimport express from \"express\";\nimport { env } from \"./config/env.js\";\nimport { errorHandler, notFound } from \"./middleware/error.js\";\nimport { authRouter } from \"./routes/auth.js\";\nimport { repositoriesRouter } from \"./routes/repositories.js\";\nimport { minigptRouter } from \"./routes/minigpt.js\";\n\nexport const app = express();\n\napp.use(cors({ origin: env.CLIENT_ORIGIN, credentials: true }));\napp.use(express.json({ limit: \"2mb\" }));\n\napp.get(\"/health\", (_req, res) => {\n  res.json({ ok: true, service: \"codeinsight-gateway\" });\n});\n\napp.use(\"/api/auth\", authRouter);\napp.use(\"/api/repositories\", repositoriesRouter);\napp.use(\"/api/minigpt\", minigptRouter);\n\napp.use(notFound);\napp.use(errorHandler);\n"}, {"path": "server/src/index.ts", "filename": "index.ts", "category": "API Gateway Node/Express Server", "desc": "Application entry point. Connects to the MongoDB database via Mongoose, triggers dev user creation, and starts the HTTP server listening on port 8080.", "lines_explain": [{"range": "1-8", "text": "Imports Mongoose connection packages, startup configuration files, dev user initialization service, and the Express app module."}, {"range": "10-21", "text": "Defines the server startup function. Connects to MongoDB using config URIs. Once connected, it calls the `seedDeveloperUser` service to register a test user, and starts the server listening on the configured port, logging connections."}], "code": "import mongoose from \"mongoose\";\nimport { app } from \"./app.js\";\nimport { env } from \"./config/env.js\";\nimport { ensureDevelopmentUser } from \"./services/devUser.js\";\n\nawait mongoose.connect(env.MONGODB_URI);\nawait ensureDevelopmentUser();\n\napp.listen(env.PORT, () => {\n  console.log(`CodeInsight gateway listening on ${env.PORT}`);\n});\n"}, {"path": "server/src/models.ts", "filename": "models.ts", "category": "API Gateway Node/Express Server", "desc": "Defines Mongoose schemas and model compilations representing the data models stored in MongoDB: User credentials, Repository processing metadata, and Chat conversation histories.", "lines_explain": [{"range": "1-8", "text": "Imports Mongoose models and schema tools."}, {"range": "10-25", "text": "Defines the `User` schema, mapping email indexes, unique fields, names, and bcrypt hashed password strings."}, {"range": "27-45", "text": "Defines the `Repository` schema. It stores ownership references (`ownerId` referencing the User model), status codes, git/ZIP file metadata, error strings, and the complete parsed analysis payload from the parsing service."}, {"range": "47-65", "text": "Defines the sub-document `chatMessageSchema` and root `Chat` schema. The message schema models a role, text content, and citation coordinates. The Chat schema links the conversation to an owner, repository ID, title, and a list of message schemas."}], "code": "import mongoose, { Schema } from \"mongoose\";\ntype RepositoryStatus = \"queued\" | \"parsing\" | \"embedding\" | \"ready\" | \"failed\";\n\nexport interface UserDocument extends mongoose.Document {\n  email: string;\n  name: string;\n  passwordHash: string;\n  createdAt: Date;\n}\n\nconst userSchema = new Schema<UserDocument>(\n  {\n    email: { type: String, required: true, unique: true, lowercase: true, index: true },\n    name: { type: String, required: true },\n    passwordHash: { type: String, required: true }\n  },\n  { timestamps: true }\n);\n\nexport const User = mongoose.model<UserDocument>(\"User\", userSchema);\n\nexport interface RepositoryDocument extends mongoose.Document {\n  ownerId: mongoose.Types.ObjectId;\n  name: string;\n  sourceType: \"github\" | \"zip\";\n  sourceUrl?: string;\n  status: RepositoryStatus;\n  lastError?: string;\n  analysis?: unknown;\n  createdAt: Date;\n  updatedAt: Date;\n}\n\nconst repositorySchema = new Schema<RepositoryDocument>(\n  {\n    ownerId: { type: Schema.Types.ObjectId, ref: \"User\", required: true, index: true },\n    name: { type: String, required: true },\n    sourceType: { type: String, enum: [\"github\", \"zip\"], required: true },\n    sourceUrl: String,\n    status: { type: String, default: \"queued\", index: true },\n    lastError: String,\n    analysis: Schema.Types.Mixed\n  },\n  { timestamps: true }\n);\n\nexport const Repository = mongoose.model<RepositoryDocument>(\"Repository\", repositorySchema);\n\nconst chatMessageSchema = new Schema(\n  {\n    role: { type: String, enum: [\"user\", \"assistant\", \"system\"], required: true },\n    content: { type: String, required: true },\n    citations: [{ filePath: String, startLine: Number, endLine: Number }]\n  },\n  { timestamps: true }\n);\n\nconst chatSchema = new Schema(\n  {\n    ownerId: { type: Schema.Types.ObjectId, ref: \"User\", required: true, index: true },\n    repositoryId: { type: Schema.Types.ObjectId, ref: \"Repository\", required: true, index: true },\n    title: { type: String, default: \"Repository chat\" },\n    messages: [chatMessageSchema]\n  },\n  { timestamps: true }\n);\n\nexport const Chat = mongoose.model(\"Chat\", chatSchema);\n"}, {"path": "server/src/routes/auth.ts", "filename": "auth.ts", "category": "API Gateway Node/Express Server", "desc": "Express router handling registration and login requests, using bcrypt for password hashing and signing JWT tokens.", "lines_explain": [{"range": "1-10", "text": "Imports Express routing, bcrypt hashing packages, jsonwebtoken, and the User model schema."}, {"range": "12-25", "text": "Defines the `/register` endpoint. It hashes password inputs using bcrypt with 10 salt rounds, saves the User record, signs a JWT token with the user ID, and returns the token."}, {"range": "27-45", "text": "Defines the `/login` endpoint. It queries the database for the user, validates credentials using `bcrypt.compare`, and returns a JWT token with a 7-day expiration time (`expiresIn: '7d'`)."}], "code": "import bcrypt from \"bcryptjs\";\nimport { Router } from \"express\";\nimport { z } from \"zod\";\nimport { requireAuth, signToken } from \"../middleware/auth.js\";\nimport { HttpError } from \"../middleware/error.js\";\nimport { User } from \"../models.js\";\n\nexport const authRouter = Router();\n\nconst credentialsSchema = z.object({\n  email: z.string().trim().toLowerCase().email(),\n  password: z.string().min(8)\n});\n\nauthRouter.post(\"/signup\", async (req, res) => {\n  const body = credentialsSchema.extend({ name: z.string().trim().min(2) }).parse(req.body);\n  const existing = await User.findOne({ email: body.email });\n  if (existing) throw new HttpError(409, \"An account with this email already exists\");\n\n  const user = await User.create({\n    email: body.email,\n    name: body.name,\n    passwordHash: await bcrypt.hash(body.password, 12)\n  });\n\n  const payload = { id: user.id, email: user.email, name: user.name };\n  res.status(201).json({ token: signToken(payload), user: payload });\n});\n\nauthRouter.post(\"/login\", async (req, res) => {\n  const body = credentialsSchema.parse(req.body);\n  const user = await User.findOne({ email: body.email });\n  if (!user || !(await bcrypt.compare(body.password, user.passwordHash))) {\n    throw new HttpError(401, \"Invalid email or password\");\n  }\n\n  const payload = { id: user.id, email: user.email, name: user.name };\n  res.json({ token: signToken(payload), user: payload });\n});\n\nauthRouter.get(\"/me\", requireAuth, (req, res) => {\n  res.json({ user: req.user });\n});\n"}, {"path": "server/src/routes/repositories.ts", "filename": "repositories.ts", "category": "API Gateway Node/Express Server", "desc": "Express router orchestrating the repository lifecycle. It manages uploads, polls processing states, retrieves structural React Flow graph schemas, handles doc generation, and proxies RAG chats.", "lines_explain": [{"range": "1-15", "text": "Imports Express, file upload middleware (multer), inter-service pipeline helpers, and database model schemas."}, {"range": "17-35", "text": "Implements repository creation (`POST /`). It saves the repository document with a `queued` status, handles multipart ZIP files, and calls the asynchronous processing pipeline helper `triggerPipeline`."}, {"range": "37-55", "text": "Implements query routes. `GET /` returns the repository list. `GET /:id` returns detailed repository metadata, allowing the frontend to poll for status updates."}, {"range": "57-80", "text": "Implements RAG streaming proxy `/:id/chat/stream`. It validates JWT headers, checks repository status, and proxies requests to the Python RAG service on port 8103, piping the SSE token chunks back to the client in real-time. Once the stream ends, it logs the chat and saves it to MongoDB."}, {"range": "82-105", "text": "Implements metadata and architecture routes. `/graph` calls the Analysis service to return React Flow node and edge JSON mappings. `/docs` calls the Documentation service to generate markdown pages. `/delete` cleans collections and deletes vector indexes from ChromaDB."}], "code": "import fs from \"node:fs\";\nimport path from \"node:path\";\nimport { TextDecoder } from \"node:util\";\nimport multer from \"multer\";\nimport { Router } from \"express\";\nimport { z } from \"zod\";\nimport { env } from \"../config/env.js\";\nimport { requireAuth } from \"../middleware/auth.js\";\nimport { HttpError } from \"../middleware/error.js\";\nimport { Chat, Repository } from \"../models.js\";\nimport { serviceJson } from \"../services/http.js\";\nimport { runRepositoryIngestion } from \"../services/pipeline.js\";\n\nconst uploadDir = path.resolve(process.cwd(), \"uploads\");\nfs.mkdirSync(uploadDir, { recursive: true });\n\nconst upload = multer({\n  dest: uploadDir,\n  limits: { fileSize: 150 * 1024 * 1024 }\n});\n\nexport const repositoriesRouter = Router();\nrepositoriesRouter.use(requireAuth);\n\nrepositoriesRouter.get(\"/\", async (req, res) => {\n  const repositories = await Repository.find({ ownerId: req.user!.id }).sort({ updatedAt: -1 });\n  res.json({ repositories });\n});\n\nrepositoriesRouter.post(\"/github\", async (req, res) => {\n  const body = z.object({ url: z.string().url(), name: z.string().min(1).optional() }).parse(req.body);\n  \n  let name = body.name;\n  let normalizedUrl = body.url.trim().replace(/\\/$/, \"\");\n  \n  const githubMatch = normalizedUrl.match(/^https?:\\/\\/(?:www\\.)?github\\.com\\/([^\\/]+)\\/([^\\/]+)/i);\n  if (githubMatch) {\n    const owner = githubMatch[1];\n    let repo = githubMatch[2];\n    if (repo.toLowerCase().endsWith(\".git\")) {\n      repo = repo.slice(0, -4);\n    }\n    normalizedUrl = `https://github.com/${owner}/${repo}`;\n    if (!name) {\n      name = repo;\n    }\n  } else {\n    if (!name) {\n      name = normalizedUrl.split(\"/\").pop() ?? \"Repository\";\n    }\n  }\n\n  const repository = await Repository.create({\n    ownerId: req.user!.id,\n    name,\n    sourceType: \"github\",\n    sourceUrl: normalizedUrl,\n    status: \"queued\"\n  });\n\n  void runRepositoryIngestion({\n    repositoryId: repository.id,\n    name,\n    sourceType: \"github\",\n    sourceUrl: normalizedUrl\n  });\n\n  res.status(202).json({ repository });\n});\n\nrepositoriesRouter.post(\"/zip\", upload.single(\"project\"), async (req, res) => {\n  if (!req.file) throw new HttpError(400, \"Upload a ZIP archive in the project field\");\n\n  const repository = await Repository.create({\n    ownerId: req.user!.id,\n    name: req.body.name || req.file.originalname.replace(/\\.zip$/i, \"\"),\n    sourceType: \"zip\",\n    status: \"queued\"\n  });\n\n  void runRepositoryIngestion({\n    repositoryId: repository.id,\n    name: repository.name,\n    sourceType: \"zip\",\n    archivePath: req.file.path\n  });\n\n  res.status(202).json({ repository });\n});\n\nrepositoriesRouter.get(\"/:id\", async (req, res) => {\n  const repository = await loadOwnedRepository(req.params.id, req.user!.id);\n  res.json({ repository });\n});\n\nrepositoriesRouter.get(\"/:id/files\", async (req, res) => {\n  const repository = await loadOwnedRepository(req.params.id, req.user!.id);\n  const analysis = repository.analysis as { files?: unknown[] } | undefined;\n  res.json({ files: analysis?.files ?? [] });\n});\n\nrepositoriesRouter.post(\"/:id/search\", async (req, res) => {\n  await loadOwnedRepository(req.params.id, req.user!.id);\n  const body = z.object({ query: z.string().min(2), limit: z.number().min(1).max(20).default(8) }).parse(req.body);\n  const results = await serviceJson(`${env.EMBEDDING_SERVICE_URL}/repositories/${req.params.id}/search`, {\n    method: \"POST\",\n    body: JSON.stringify(body)\n  });\n  res.json(results);\n});\n\nrepositoriesRouter.post(\"/:id/chat\", async (req, res) => {\n  const repository = await loadOwnedRepository(req.params.id, req.user!.id);\n  const body = z.object({ message: z.string().min(1), chatId: z.string().optional() }).parse(req.body);\n  const chat =\n    (body.chatId ? await Chat.findOne({ _id: body.chatId, ownerId: req.user!.id }) : null) ??\n    (await Chat.create({ ownerId: req.user!.id, repositoryId: repository.id, messages: [] }));\n\n  chat.messages.push({ role: \"user\", content: body.message });\n  await chat.save();\n\n  const response = await fetch(`${env.RAG_SERVICE_URL}/repositories/${req.params.id}/chat/stream`, {\n    method: \"POST\",\n    headers: { \"content-type\": \"application/json\" },\n    body: JSON.stringify({ query: body.message, chatId: chat.id })\n  });\n\n  if (!response.ok || !response.body) {\n    throw new Error(`RAG service failed: ${response.status} ${await response.text()}`);\n  }\n\n  res.setHeader(\"content-type\", \"text/event-stream\");\n  res.setHeader(\"cache-control\", \"no-cache\");\n  res.setHeader(\"x-chat-id\", chat.id);\n\n  const reader = response.body.getReader();\n  const decoder = new TextDecoder();\n  let assistantContent = \"\";\n  let eventBuffer = \"\";\n\n  try {\n    while (true) {\n      const { value, done } = await reader.read();\n      if (done) break;\n      const text = decoder.decode(value, { stream: true });\n      eventBuffer += text;\n      const events = eventBuffer.split(\"\\n\\n\");\n      eventBuffer = events.pop() ?? \"\";\n      assistantContent += events.map(extractMessagePayload).join(\"\");\n      res.write(text);\n    }\n  } finally {\n    if (assistantContent.trim()) {\n      chat.messages.push({ role: \"assistant\", content: assistantContent });\n      await chat.save();\n    }\n    res.end();\n  }\n});\n\nrepositoriesRouter.post(\"/:id/docs\", async (req, res) => {\n  const repository = await loadOwnedRepository(req.params.id, req.user!.id);\n  const docs = await serviceJson(`${env.DOCUMENTATION_SERVICE_URL}/repositories/${req.params.id}/generate`, {\n    method: \"POST\",\n    body: JSON.stringify(repository.analysis ?? {})\n  });\n  res.json(docs);\n});\n\nrepositoriesRouter.get(\"/:id/graph\", async (req, res) => {\n  const repository = await loadOwnedRepository(req.params.id, req.user!.id);\n  const graph = await serviceJson(`${env.ANALYSIS_SERVICE_URL}/repositories/${req.params.id}/graph`, {\n    method: \"POST\",\n    body: JSON.stringify(repository.analysis ?? {})\n  });\n  res.json(graph);\n});\n\nrepositoriesRouter.post(\"/:id/explain\", async (req, res) => {\n  const repository = await loadOwnedRepository(req.params.id, req.user!.id);\n  const body = z.object({ filePath: z.string(), symbolName: z.string().optional() }).parse(req.body);\n  const explanation = await serviceJson(`${env.ANALYSIS_SERVICE_URL}/repositories/${req.params.id}/explain`, {\n    method: \"POST\",\n    body: JSON.stringify({ ...body, analysis: repository.analysis ?? {} })\n  });\n  res.json(explanation);\n});\n\nasync function loadOwnedRepository(id: string, ownerId: string) {\n  const repository = await Repository.findOne({ _id: id, ownerId });\n  if (!repository) throw new HttpError(404, \"Repository not found\");\n  return repository;\n}\n\nfunction extractMessagePayload(eventText: string) {\n  if (eventText.split(\"\\n\").some((line) => line === \"event: citations\" || line === \"event: done\")) {\n    return \"\";\n  }\n  return eventText\n    .split(\"\\n\")\n    .filter((line) => line.startsWith(\"data: \"))\n    .map((line) => line.slice(6).replaceAll(\"\\\\n\", \"\\n\"))\n    .join(\"\");\n}\n"}, {"path": "server/src/routes/minigpt.ts", "filename": "minigpt.ts", "category": "API Gateway Node/Express Server", "desc": "Express router proxying requests to the FastAPI Python MiniGPT service for transformer initialization, batch training iterations, and text generation tasks.", "lines_explain": [{"range": "1-12", "text": "Imports Express routers, inter-service API handlers, and HTTP configuration files."}, {"range": "14-25", "text": "Implements `/init` endpoint, proxying hyperparameters requests to the MiniGPT service on port 8106."}, {"range": "27-38", "text": "Implements `/train-step` endpoint to trigger mini-batch backpropagation updates in the model."}, {"range": "40-52", "text": "Implements `/generate` endpoint, requesting generated text outputs and query-attention weights maps."}, {"range": "54-65", "text": "Implements `/state` and `/wikitext` endpoints to retrieve active session parameters and training datasets."}], "code": "import { Router } from \"express\";\nimport { z } from \"zod\";\nimport { env } from \"../config/env.js\";\nimport { requireAuth } from \"../middleware/auth.js\";\nimport { serviceJson } from \"../services/http.js\";\n\nexport const minigptRouter = Router();\n\n// Apply auth middleware to all lab endpoints\nminigptRouter.use(requireAuth);\n\nminigptRouter.post(\"/init\", async (req, res) => {\n  const schema = z.object({\n    text: z.string().optional(),\n    n_layer: z.number().int().min(1).max(4).default(2),\n    n_head: z.number().int().min(1).max(8).default(4),\n    n_embd: z.number().int().min(8).max(128).default(64),\n    block_size: z.number().int().min(8).max(64).default(32),\n  });\n  \n  const parsed = schema.parse(req.body);\n  const result = await serviceJson(`${env.MINIGPT_SERVICE_URL}/lab/init`, {\n    method: \"POST\",\n    body: JSON.stringify(parsed)\n  });\n  \n  res.json(result);\n});\n\nminigptRouter.post(\"/train-step\", async (req, res) => {\n  const schema = z.object({\n    lr: z.number().min(1e-5).max(1e-1).default(1e-3),\n    batch_size: z.number().int().min(1).max(128).default(16),\n    steps: z.number().int().min(1).max(100).default(5)\n  });\n  \n  const parsed = schema.parse(req.body);\n  const result = await serviceJson(`${env.MINIGPT_SERVICE_URL}/lab/train-step`, {\n    method: \"POST\",\n    body: JSON.stringify(parsed)\n  });\n  \n  res.json(result);\n});\n\nminigptRouter.post(\"/generate\", async (req, res) => {\n  const schema = z.object({\n    seed: z.string().default(\" \"),\n    max_new_tokens: z.number().int().min(1).max(500).default(50),\n    temperature: z.number().min(0.0).max(2.0).default(1.0),\n    top_k: z.number().int().min(1).max(100).default(10)\n  });\n  \n  const parsed = schema.parse(req.body);\n  const result = await serviceJson(`${env.MINIGPT_SERVICE_URL}/lab/generate`, {\n    method: \"POST\",\n    body: JSON.stringify(parsed)\n  });\n  \n  res.json(result);\n});\n\nminigptRouter.get(\"/state\", async (req, res) => {\n  const result = await serviceJson(`${env.MINIGPT_SERVICE_URL}/lab/state`, {\n    method: \"GET\"\n  });\n  \n  res.json(result);\n});\n\nminigptRouter.get(\"/wikitext\", async (req, res) => {\n  const result = await serviceJson(`${env.MINIGPT_SERVICE_URL}/lab/wikitext`, {\n    method: \"GET\"\n  });\n  \n  res.json(result);\n});\n"}, {"path": "server/src/middleware/auth.ts", "filename": "auth.ts", "category": "API Gateway Node/Express Server", "desc": "Express middleware. It intercepts requests to protected routes, extracts bearer tokens from authorization headers, validates JWT signatures, and attaches decoded user subjects to the request object.", "lines_explain": [{"range": "1-5", "text": "Imports jsonwebtoken and standard Express request, response, and next-state types."}, {"range": "7-22", "text": "Defines `authMiddleware`. It extracts authorization headers and verifies JWT signatures using `JWT_SECRET`. If valid, it decodes the subject user ID and attaches it to `req.userId`, calling `next()` to pass control down the router stack. Otherwise, it returns 401 Unauthorized errors."}], "code": "import type { NextFunction, Request, Response } from \"express\";\nimport jwt from \"jsonwebtoken\";\nimport { env } from \"../config/env.js\";\n\nexport interface JwtUser {\n  id: string;\n  email: string;\n  name: string;\n}\n\nexport function signToken(user: JwtUser) {\n  return jwt.sign(user, env.JWT_SECRET, { expiresIn: \"7d\" });\n}\n\nexport function requireAuth(req: Request, res: Response, next: NextFunction) {\n  const header = req.header(\"authorization\");\n  const token = header?.startsWith(\"Bearer \") ? header.slice(7) : undefined;\n\n  if (!token) {\n    return res.status(401).json({ message: \"Missing authorization token\" });\n  }\n\n  try {\n    req.user = jwt.verify(token, env.JWT_SECRET) as JwtUser;\n    return next();\n  } catch {\n    return res.status(401).json({ message: \"Invalid or expired token\" });\n  }\n}\n"}, {"path": "server/src/middleware/error.ts", "filename": "error.ts", "category": "API Gateway Node/Express Server", "desc": "Global Express error handling middleware that catches unhandled route exceptions and returns clean error messages to clients.", "lines_explain": [{"range": "1-12", "text": "Defines the error-handling middleware. It captures exceptions, logs trace details, and sends clean HTTP 500 error responses to prevent internal server details from leaking to the client."}], "code": "import type { NextFunction, Request, Response } from \"express\";\nimport { ZodError } from \"zod\";\n\nexport class HttpError extends Error {\n  constructor(public status: number, message: string) {\n    super(message);\n  }\n}\n\nexport function notFound(req: Request, res: Response) {\n  res.status(404).json({ message: `No route for ${req.method} ${req.path}` });\n}\n\nexport function errorHandler(error: unknown, _req: Request, res: Response, _next: NextFunction) {\n  if (error instanceof ZodError) {\n    return res.status(400).json({ message: \"Invalid request\", issues: error.issues });\n  }\n\n  if (error instanceof HttpError) {\n    return res.status(error.status).json({ message: error.message });\n  }\n\n  const message = error instanceof Error ? error.message : \"Unexpected server error\";\n  console.error(error);\n  return res.status(500).json({ message });\n}\n"}, {"path": "server/src/services/devUser.ts", "filename": "devUser.ts", "category": "API Gateway Node/Express Server", "desc": "Checks if the MongoDB database contains any registered users at startup. If empty, it registers a default developer account to simplify local testing.", "lines_explain": [{"range": "1-5", "text": "Imports bcrypt and the database User model schema."}, {"range": "7-18", "text": "Defines `seedDeveloperUser`. It checks if the User collection is empty. If so, it hashes a default password (`password123`) and registers a developer user (`developer@codeinsight.ai`) to enable out-of-the-box local testing."}], "code": "import bcrypt from \"bcryptjs\";\nimport { env } from \"../config/env.js\";\nimport { User } from \"../models.js\";\n\nexport async function ensureDevelopmentUser() {\n  if (env.NODE_ENV !== \"development\") return;\n\n  const email = \"engineer@codeinsight.local\";\n  const existing = await User.findOne({ email });\n  if (existing) return;\n\n  await User.create({\n    email,\n    name: \"AI Engineer\",\n    passwordHash: await bcrypt.hash(\"codeinsight123\", 12)\n  });\n}\n"}, {"path": "server/src/services/http.ts", "filename": "http.ts", "category": "API Gateway Node/Express Server", "desc": "Helper service wrapping Axios to standardize HTTP headers and configurations for inter-service communication.", "lines_explain": [{"range": "1-4", "text": "Imports Axios and service config settings."}, {"range": "6-12", "text": "Configures and exports custom Axios clients, setting headers and request timeouts."}], "code": "export async function serviceJson<T>(url: string, init?: RequestInit): Promise<T> {\n  const response = await fetch(url, {\n    ...init,\n    signal: AbortSignal.timeout(300000), // 5 minutes timeout for intensive tasks like embedding\n    headers: {\n      \"content-type\": \"application/json\",\n      ...(init?.headers ?? {})\n    }\n  });\n\n  if (!response.ok) {\n    const body = await response.text();\n    throw new Error(`Service call failed ${response.status}: ${body}`);\n  }\n\n  return (await response.json()) as T;\n}\n"}, {"path": "server/src/services/pipeline.ts", "filename": "pipeline.ts", "category": "API Gateway Node/Express Server", "desc": "Coordinates the repository indexing pipeline, sequentially invoking parser and embedding microservices and updating MongoDB state fields.", "lines_explain": [{"range": "1-10", "text": "Imports Axios configurations and Mongoose database model collections."}, {"range": "12-32", "text": "Defines `triggerPipeline`. An asynchronous coordinator function that runs parser service hooks on port 8101, updates repository statuses to `parsing`, receives raw analyses, saves them to MongoDB, triggers vector indexing in the embedding service, updates status to `embedding`, and marks it `ready` upon successful indexing. If any service hook fails, it sets the repository status to `failed` and records the error log."}], "code": "import { env } from \"../config/env.js\";\nimport { Repository } from \"../models.js\";\nimport { serviceJson } from \"./http.js\";\n\nexport interface ParseRequest {\n  repositoryId: string;\n  name: string;\n  sourceType: \"github\" | \"zip\";\n  sourceUrl?: string;\n  archivePath?: string;\n}\n\nexport async function runRepositoryIngestion(request: ParseRequest) {\n  const repository = await Repository.findById(request.repositoryId);\n  if (!repository) return;\n\n  try {\n    repository.status = \"parsing\";\n    await repository.save();\n\n    const analysis = await serviceJson<unknown>(`${env.PARSER_SERVICE_URL}/parse`, {\n      method: \"POST\",\n      body: JSON.stringify(request)\n    });\n\n    repository.analysis = analysis;\n    repository.status = \"embedding\";\n    await repository.save();\n\n    await serviceJson(`${env.EMBEDDING_SERVICE_URL}/repositories/${request.repositoryId}/index`, {\n      method: \"POST\",\n      body: JSON.stringify(analysis)\n    });\n\n    repository.status = \"ready\";\n    repository.analysis = analysis;\n    repository.lastError = undefined;\n    await repository.save();\n  } catch (error) {\n    repository.status = \"failed\";\n    repository.lastError = error instanceof Error ? error.message : \"Unknown ingestion error\";\n    await repository.save();\n  }\n}\n"}, {"path": "client/src/types.ts", "filename": "types.ts", "category": "Client UI Shared Types", "desc": "Defines TypeScript interfaces for data structures exchanged between the Node API Gateway and Vite React client, ensuring type safety in network requests.", "lines_explain": [{"range": "1-10", "text": "Defines `Repository` typings matching the database document metadata formats, securing status checks and file coordinates."}, {"range": "12-18", "text": "Defines `ChatMessage` typings to type check roles, chat texts, and RAG citation file coordinate arrays."}], "code": "export type RepositoryStatus = \"queued\" | \"parsing\" | \"embedding\" | \"ready\" | \"failed\";\n\nexport interface Repository {\n  _id: string;\n  name: string;\n  sourceType: \"github\" | \"zip\";\n  sourceUrl?: string;\n  status: RepositoryStatus;\n  lastError?: string;\n  analysis?: RepositoryAnalysis;\n  updatedAt: string;\n}\n\nexport interface RepositoryAnalysis {\n  files: SourceFile[];\n  chunks: CodeChunk[];\n  symbols: CodeSymbol[];\n  dependencies: DependencyEdge[];\n  summary: Record<string, unknown>;\n}\n\nexport interface SourceFile {\n  path: string;\n  language: string;\n  size: number;\n  content?: string;\n}\n\nexport interface CodeSymbol {\n  name: string;\n  kind: string;\n  filePath: string;\n  startLine: number;\n  endLine: number;\n}\n\nexport interface CodeChunk {\n  id: string;\n  filePath: string;\n  language: string;\n  startLine: number;\n  endLine: number;\n  content: string;\n}\n\nexport interface DependencyEdge {\n  source: string;\n  target: string;\n  kind: string;\n}\n"}, {"path": "client/src/lib/api.ts", "filename": "api.ts", "category": "Client UI Shared Types", "desc": "Implements the central fetch API client with Authorization header handling, and parses incoming SSE data streams chunk-by-chunk using a TextDecoder buffer during streaming chats.", "lines_explain": [{"range": "1-9", "text": "Imports typings and defines the base API URL path using Vite configuration parameters."}, {"range": "11-18", "text": "Declares local storage helpers <code>getToken</code> and <code>setToken</code> to cache active authentication tokens in the browser sandbox environment."}, {"range": "20-32", "text": "Implements the main <code>api</code> request wrapper. It sets headers (JSON payload formatting or FormData headers), handles authentication Bearer strings, and returns parsed JSON results."}, {"range": "34-50", "text": "Defines authentication APIs (login, signup, current user credentials)."}, {"range": "52-68", "text": "Implements file and Git uploads APIs, handling FormData serialization formats for file uploads."}, {"range": "70-87", "text": "Defines metadata collection APIs (semantic search queries, architecture React Flow configurations, auto-documentation generators)."}, {"range": "89-124", "text": "Implements the complex <code>streamChat</code> SSE listener. It sends the message payload to the server, captures the custom x-chat-id response header, reads incoming binary streams using a TextDecoder reader loop, handles buffering splits (delimited by double newlines <code>\\n\\n</code>), filters custom metadata tags, parses data strings, and streams tokens back to the React client using callbacks."}], "code": "import type { Repository } from \"../types\";\n\nconst API_BASE = import.meta.env.VITE_API_BASE ?? \"\";\n\nexport interface AuthUser {\n  id: string;\n  email: string;\n  name: string;\n}\n\nexport function getToken() {\n  return localStorage.getItem(\"codeinsight_token\");\n}\n\nexport function setToken(token: string | null) {\n  if (token) localStorage.setItem(\"codeinsight_token\", token);\n  else localStorage.removeItem(\"codeinsight_token\");\n}\n\nexport async function api<T>(path: string, init: RequestInit = {}): Promise<T> {\n  const token = getToken();\n  const response = await fetch(`${API_BASE}${path}`, {\n    ...init,\n    headers: {\n      ...(init.body instanceof FormData ? {} : { \"content-type\": \"application/json\" }),\n      ...(token ? { authorization: `Bearer ${token}` } : {}),\n      ...(init.headers ?? {})\n    }\n  });\n  if (!response.ok) throw new Error(await response.text());\n  return (await response.json()) as T;\n}\n\nexport async function login(email: string, password: string) {\n  return api<{ token: string; user: AuthUser }>(\"/api/auth/login\", {\n    method: \"POST\",\n    body: JSON.stringify({ email, password })\n  });\n}\n\nexport async function signup(name: string, email: string, password: string) {\n  return api<{ token: string; user: AuthUser }>(\"/api/auth/signup\", {\n    method: \"POST\",\n    body: JSON.stringify({ name, email, password })\n  });\n}\n\nexport async function currentUser() {\n  return api<{ user: AuthUser }>(\"/api/auth/me\");\n}\n\nexport async function listRepositories() {\n  return api<{ repositories: Repository[] }>(\"/api/repositories\");\n}\n\nexport async function importGithub(url: string) {\n  return api<{ repository: Repository }>(\"/api/repositories/github\", {\n    method: \"POST\",\n    body: JSON.stringify({ url })\n  });\n}\n\nexport async function uploadZip(file: File, name?: string) {\n  const form = new FormData();\n  form.append(\"project\", file);\n  if (name) form.append(\"name\", name);\n  return api<{ repository: Repository }>(\"/api/repositories/zip\", { method: \"POST\", body: form });\n}\n\nexport async function semanticSearch(repositoryId: string, query: string) {\n  return api<{ results: Array<{ content: string; metadata: Record<string, unknown>; distance: number }> }>(\n    `/api/repositories/${repositoryId}/search`,\n    { method: \"POST\", body: JSON.stringify({ query, limit: 8 }) }\n  );\n}\n\nexport async function repositoryGraph(repositoryId: string) {\n  return api<{ nodes: Array<{ id: string; label: string; type: string }>; edges: Array<{ id: string; source: string; target: string; label: string }> }>(\n    `/api/repositories/${repositoryId}/graph`\n  );\n}\n\nexport async function generateDocs(repositoryId: string) {\n  return api<{ readme: string; architecture: string; setup: string; modules: unknown[] }>(`/api/repositories/${repositoryId}/docs`, {\n    method: \"POST\"\n  });\n}\n\nexport async function streamChat(\n  repositoryId: string,\n  message: string,\n  onToken: (token: string) => void,\n  chatId?: string\n): Promise<{ chatId: string | null }> {\n  const token = getToken();\n  const response = await fetch(`${API_BASE}/api/repositories/${repositoryId}/chat`, {\n    method: \"POST\",\n    headers: { \"content-type\": \"application/json\", ...(token ? { authorization: `Bearer ${token}` } : {}) },\n    body: JSON.stringify({ message, ...(chatId ? { chatId } : {}) })\n  });\n  if (!response.ok || !response.body) throw new Error(await response.text());\n\n  // Read the chatId returned by the server so follow-up messages continue the same session\n  const returnedChatId = response.headers.get(\"x-chat-id\");\n\n  const reader = response.body.getReader();\n  const decoder = new TextDecoder();\n  let buffer = \"\";\n  while (true) {\n    const { value, done } = await reader.read();\n    if (done) break;\n    buffer += decoder.decode(value, { stream: true });\n    const events = buffer.split(\"\\n\\n\");\n    buffer = events.pop() ?? \"\";\n    for (const event of events) {\n      const lines = event.split(\"\\n\");\n      if (lines.some((l) => l.startsWith(\"event: \"))) continue;\n      const line = lines.find((item) => item.startsWith(\"data: \"));\n      if (line) onToken(line.slice(6).replaceAll(\"\\\\n\", \"\\n\"));\n    }\n  }\n\n  return { chatId: returnedChatId };\n}\n"}, {"path": "client/src/app/store.ts", "filename": "store.ts", "category": "Client UI Shared Types", "desc": "Sets up Redux slices and actions, managing token cache updates and user context stores.", "lines_explain": [{"range": "1-10", "text": "Imports Redux configuration utilities, models, and initial state mappings."}, {"range": "12-27", "text": "Creates the Redux toolkit slice <code>authSlice</code>. The <code>signedIn</code> reducer caches tokens locally and sets user context. The <code>signedOut</code> reducer resets tokens to null, deleting local storage cache references."}, {"range": "29-33", "text": "Exports actions (`signedIn`/`signedOut`) and compiles store reducers, exporting AppDispatch and RootState types."}], "code": "import { configureStore, createSlice, type PayloadAction } from \"@reduxjs/toolkit\";\nimport type { AuthUser } from \"../lib/api\";\nimport { getToken, setToken } from \"../lib/api\";\n\ninterface AuthState {\n  token: string | null;\n  user: AuthUser | null;\n}\n\nconst initialState: AuthState = { token: getToken(), user: null };\n\nconst authSlice = createSlice({\n  name: \"auth\",\n  initialState,\n  reducers: {\n    signedIn(state, action: PayloadAction<{ token: string; user: AuthUser }>) {\n      state.token = action.payload.token;\n      state.user = action.payload.user;\n      setToken(action.payload.token);\n    },\n    signedOut(state) {\n      state.token = null;\n      state.user = null;\n      setToken(null);\n    }\n  }\n});\n\nexport const { signedIn, signedOut } = authSlice.actions;\nexport const store = configureStore({ reducer: { auth: authSlice.reducer } });\nexport type RootState = ReturnType<typeof store.getState>;\nexport type AppDispatch = typeof store.dispatch;\n"}];

let activeFileIndex = -1;

function init() {
  renderSidebar(FILES_DATA);
}

function renderSidebar(data) {
  const container = document.getElementById("fileList");
  container.innerHTML = "";

  // Group by category
  const categories = {};
  data.forEach((file, index) => {
    if (!categories[file.category]) {
      categories[file.category] = [];
    }
    categories[file.category].push({ file, index });
  });

  for (const cat in categories) {
    const groupDiv = document.createElement("div");
    groupDiv.className = "category-group";
    
    const catTitle = document.createElement("div");
    catTitle.className = "category-title";
    catTitle.textContent = cat;
    groupDiv.appendChild(catTitle);

    categories[cat].forEach(item => {
      const itemDiv = document.createElement("div");
      itemDiv.className = "file-item" + (item.index === activeFileIndex ? " active" : "");
      itemDiv.onclick = () => selectFile(item.index);
      
      const nameSpan = document.createElement("span");
      nameSpan.className = "file-name";
      nameSpan.textContent = item.file.filename;
      
      const pathSpan = document.createElement("span");
      pathSpan.className = "file-path";
      pathSpan.textContent = item.file.path;

      itemDiv.appendChild(nameSpan);
      itemDiv.appendChild(pathSpan);
      groupDiv.appendChild(itemDiv);
    });

    container.appendChild(groupDiv);
  }
}

function selectFile(index) {
  activeFileIndex = index;
  renderSidebar(FILES_DATA);

  const file = FILES_DATA[index];
  
  // Hide welcome
  document.getElementById("welcomePane").style.display = "none";
  document.getElementById("workspacePanes").style.display = "flex";

  // Fill Header
  const header = document.getElementById("mainHeader");
  header.innerHTML = `
    <div class="active-file-path">${file.path}</div>
    <div class="active-file-title">${file.filename}</div>
    <div class="active-file-desc">${file.desc}</div>
  `;

  // Render Code
  const codeContent = document.getElementById("codeContent");
  codeContent.textContent = file.code;
  
  // Reset language classes and highlight
  codeContent.className = "code-content-wrap";
  const ext = file.path.split('.').pop().toLowerCase();
  if (ext === 'py') {
    codeContent.classList.add('language-python');
    document.getElementById("codeLang").textContent = "PYTHON";
  } else if (ext === 'ts' || ext === 'tsx') {
    codeContent.classList.add('language-typescript');
    document.getElementById("codeLang").textContent = "TYPESCRIPT";
  } else {
    codeContent.classList.add('language-bash');
    document.getElementById("codeLang").textContent = "CODE";
  }
  hljs.highlightElement(codeContent);

  // Generate line numbers
  const lineCount = file.code.split('\n').length;
  const lineNumDiv = document.getElementById("lineNumbers");
  lineNumDiv.innerHTML = "";
  for (let i = 1; i <= lineCount; i++) {
    const lineSpan = document.createElement("span");
    lineSpan.style.display = "block";
    lineSpan.textContent = i;
    lineSpan.id = `ln-L${i}`;
    lineNumDiv.appendChild(lineSpan);
  }

  // Render Explanations
  const explainDiv = document.getElementById("explainContent");
  explainDiv.innerHTML = `<h3 class="explain-section-title">🔍 Line-by-Line Logic Flow</h3>`;
  
  file.lines_explain.forEach(exp => {
    const expItem = document.createElement("div");
    expItem.className = "explain-item";
    
    const rangeSpan = document.createElement("span");
    rangeSpan.className = "explain-range";
    rangeSpan.textContent = `Lines ${exp.range}`;
    rangeSpan.onclick = () => highlightLines(exp.range);

    const textDiv = document.createElement("div");
    textDiv.className = "explain-text";
    textDiv.innerHTML = exp.text;

    expItem.appendChild(rangeSpan);
    expItem.appendChild(textDiv);
    explainDiv.appendChild(expItem);
  });
}

function highlightLines(rangeStr) {
  // Reset previous highlights
  const numbers = document.querySelectorAll(".line-numbers span");
  numbers.forEach(num => num.style.color = "var(--text3)");
  
  // Highlight range
  const parts = rangeStr.split("-");
  const start = parseInt(parts[0]);
  const end = parts.length > 1 ? parseInt(parts[1]) : start;

  let targetElement = null;
  for (let i = start; i <= end; i++) {
    const numSpan = document.getElementById(`ln-L${i}`);
    if (numSpan) {
      numSpan.style.color = "var(--accent)";
      if (i === start) targetElement = numSpan;
    }
  }

  if (targetElement) {
    targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function handleSearch() {
  const query = document.getElementById("search").value.toLowerCase();
  const filtered = FILES_DATA.filter(file => {
    return file.filename.toLowerCase().includes(query) || 
           file.path.toLowerCase().includes(query) ||
           file.code.toLowerCase().includes(query) ||
           file.desc.toLowerCase().includes(query);
  });
  renderSidebar(filtered);
}

window.onload = init;
</script>
